<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Calendario Ventas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== RESET & VARIABLES ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --blue: #2563eb; --blue-dark: #1d4ed8; --blue-light: #eff6ff; --blue-mid: #bfdbfe;
      --green: #16a34a; --green-light: #f0fdf4;
      --yellow: #d97706; --yellow-light: #fffbeb;
      --purple: #7c3aed; --purple-light: #f5f3ff;
      --orange: #ea580c; --orange-light: #fff7ed;
      --red: #dc2626; --red-light: #fef2f2;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
      --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
      --radius: 8px; --radius-lg: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
      background: var(--gray-50); color: var(--gray-800);
      min-height: 100vh; font-size: 15px; line-height: 1.5;
    }

    /* ===== NAV ===== */
    .nav {
      background: white; border-bottom: 1px solid var(--gray-200);
      padding: 0 12px; display: flex; align-items: center;
      justify-content: space-between; height: 52px;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
      gap: 8px;
    }
    .nav-brand { font-weight: 700; font-size: 15px; color: var(--blue); white-space: nowrap; }
    .nav-tabs { display: flex; gap: 2px; overflow-x: auto; flex: 1; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 7px 12px; border: none; background: transparent;
      color: var(--gray-500); cursor: pointer; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; transition: all .15s; white-space: nowrap;
    }
    .tab-btn:hover { background: var(--gray-100); color: var(--gray-700); }
    .tab-btn.active { background: var(--blue-light); color: var(--blue); }
    .subnav { display:flex; gap:4px; padding:8px 14px; background:var(--gray-50); border-bottom:1px solid var(--gray-200); flex-wrap:wrap; }
    .subnav .tab-btn { font-size:12px; padding:5px 12px; }
    .nav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .nav-user-name { font-size: 12px; color: var(--gray-500); white-space: nowrap; }
    @media (max-width: 420px) { .nav-user-name { display: none; } }

    /* ===== LAYOUT ===== */
    .page { max-width: 960px; margin: 0 auto; padding: 16px 12px 80px; }

    /* ===== CARD ===== */
    .card {
      background: white; border-radius: var(--radius-lg);
      box-shadow: var(--shadow); border: 1px solid var(--gray-200); overflow: hidden;
    }
    .card-header {
      padding: 14px 16px; border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-title { font-weight: 600; font-size: 15px; }
    .card-body { padding: 16px; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 5px; padding: 8px 14px; border-radius: var(--radius);
      font-size: 14px; font-weight: 500; cursor: pointer; border: none;
      transition: all .15s; text-decoration: none; font-family: inherit;
    }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-success { background: var(--green); color: white; }
    .btn-success:hover { background: #15803d; }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }
    .btn-full { width: 100%; }

    /* ===== FORMS ===== */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 4px; }
    input[type=text], input[type=email], input[type=password], input[type=date],
    select, textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); font-size: 14px; color: var(--gray-800);
      background: white; transition: border .15s; outline: none; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    textarea { min-height: 80px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 460px) { .form-row { grid-template-columns: 1fr; } }
    select[style*="width:auto"] { width: auto !important; min-width: 0; }

    /* ===== LOGIN ===== */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
      background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%);
    }
    .login-card {
      background: white; border-radius: var(--radius-lg); padding: 36px 28px;
      width: 100%; max-width: 380px; box-shadow: var(--shadow-lg);
    }
    .login-logo { font-size: 36px; margin-bottom: 6px; }
    .login-title { font-size: 22px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
    .login-sub { color: var(--gray-500); font-size: 13px; margin-bottom: 24px; }

    /* ===== CALENDAR ===== */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .cal-month { font-size: 17px; font-weight: 700; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 1px; background: var(--gray-200); border-radius: var(--radius); overflow: hidden;
    }
    .cal-day-name {
      background: var(--gray-50); padding: 7px 2px;
      text-align: center; font-size: 11px; font-weight: 600;
      color: var(--gray-500); text-transform: uppercase; letter-spacing: .3px;
    }
    .cal-day {
      background: white; min-height: 70px; padding: 6px 5px;
      cursor: pointer; transition: background .1s; position: relative;
      user-select: none;
    }
    .cal-day:active { background: var(--blue-light); }
    .cal-day:hover { background: var(--gray-50); }
    .cal-day.today { background: var(--blue-light); }
    .cal-day.today .cal-day-num { color: var(--blue); font-weight: 700; }
    .cal-day.other-month { background: var(--gray-50); cursor: default; opacity: .45; }
    .cal-day-num { font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 3px; }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; }
    .cal-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cal-count { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
    @media (max-width: 480px) {
      .cal-day { min-height: 52px; padding: 4px 3px; }
      .cal-day-num { font-size: 11px; }
      .cal-dot { width: 6px; height: 6px; }
    }

    /* ===== ACTION PILLS ===== */
    .action-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 99px; font-size: 12px; font-weight: 500;
      white-space: nowrap;
    }
    .pill-entrega  { background: #dbeafe; color: #1d4ed8; }
    .pill-venta    { background: #dcfce7; color: #15803d; }
    .pill-cobranza { background: #fef3c7; color: #92400e; }
    .pill-reunion  { background: #ede9fe; color: #5b21b6; }
    .pill-visita   { background: #ffedd5; color: #9a3412; }

    /* ===== ACTION ITEMS ===== */
    .action-item {
      border: 1px solid var(--gray-200); border-radius: var(--radius);
      padding: 12px 14px; margin-bottom: 8px; background: white;
    }
    .action-item-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 8px; margin-bottom: 4px;
    }
    .action-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .client-tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; background: var(--gray-100); border-radius: 99px; font-size: 12px;
    }
    .action-note { font-size: 13px; color: var(--gray-600); margin-top: 6px; line-height: 1.4; }
    .action-response {
      background: var(--blue-light); border-left: 3px solid var(--blue);
      padding: 8px 10px; border-radius: 4px; margin-top: 8px; font-size: 13px;
    }
    .action-response-label { font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    @media (min-width: 580px) {
      .modal-overlay { align-items: center; padding: 20px; }
    }
    .modal {
      background: white; width: 100%; max-width: 520px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      max-height: 92vh; display: flex; flex-direction: column;
    }
    @media (min-width: 580px) {
      .modal { border-radius: var(--radius-lg); max-height: 88vh; }
    }
    .modal-header {
      padding: 14px 16px; border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title { font-weight: 700; font-size: 16px; }
    .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 12px 16px; border-top: 1px solid var(--gray-100);
      display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0;
    }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 9px 12px; text-align: left; background: var(--gray-50);
         font-weight: 600; color: var(--gray-500); font-size: 11px;
         text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--gray-200); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }

    /* ===== BADGES ===== */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-blue   { background: var(--blue-light); color: var(--blue); }
    .badge-green  { background: var(--green-light); color: var(--green); }
    .badge-yellow { background: var(--yellow-light); color: var(--yellow); }
    .badge-gray   { background: var(--gray-100); color: var(--gray-500); }

    /* ===== STEPS ===== */
    .steps { display: flex; gap: 6px; margin-bottom: 18px; }
    .step {
      flex: 1; padding: 6px 4px; text-align: center; font-size: 12px; font-weight: 500;
      border-radius: var(--radius); background: var(--gray-100); color: var(--gray-400);
    }
    .step.active { background: var(--blue); color: white; }
    .step.done   { background: var(--green-light); color: var(--green); }

    /* ===== MISC ===== */
    .empty-state { text-align: center; padding: 36px 16px; color: var(--gray-400); }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; }
    .alert-error   { background: var(--red-light); color: var(--red); }
    .alert-success { background: var(--green-light); color: var(--green); }
    .alert-info    { background: var(--blue-light); color: var(--blue-dark); }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--gray-200);
      border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite;
      display: inline-block; vertical-align: middle;
    }
    .spinner-lg { width: 32px; height: 32px; border-width: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mb-0 { margin-bottom: 0; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .text-muted { color: var(--gray-400); font-size: 13px; }
    .text-sm { font-size: 13px; }
    .font-bold { font-weight: 700; }
    .divider { height: 1px; background: var(--gray-100); margin: 14px 0; }
    code { background: var(--gray-100); padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: monospace; }

    /* ===== REPORT STATS ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1px; background: var(--gray-200); }
    .stat-box { background: white; padding: 16px 12px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--gray-500); margin-top: 4px; line-height: 1.3; }

    /* ===== FAB ===== */
    .fab {
      position: fixed; bottom: 20px; right: 16px; z-index: 50;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--blue); color: white; font-size: 26px;
      border: none; cursor: pointer; box-shadow: var(--shadow-lg);
      display: none; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .fab:active { transform: scale(.93); }
    @media (max-width: 580px) { .fab { display: flex; } }

    /* ===== NOTICE ===== */
    .notice {
      background: #fefce8; border: 1px solid #fde047; padding: 14px 16px;
      border-radius: var(--radius); font-size: 13px; line-height: 1.6;
    }

    /* ===== COMPANY BAR (owner only) ===== */
    .company-bar {
      background: white; border-bottom: 1px solid var(--gray-200);
      padding: 0 12px; display: flex; align-items: center; gap: 6px;
      height: 38px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .company-bar::-webkit-scrollbar { display: none; }
    .comp-btn {
      padding: 4px 12px; border: 1.5px solid var(--gray-200); background: white;
      border-radius: 99px; font-size: 12px; font-weight: 500; cursor: pointer;
      color: var(--gray-600); white-space: nowrap; transition: all .15s; font-family: inherit;
    }
    .comp-btn:hover { border-color: var(--blue); color: var(--blue); }
    .comp-btn.active { background: var(--blue); border-color: var(--blue); color: white; }

    /* ===== ACTION TYPE BUTTONS ===== */
    .type-btn {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-radius: var(--radius); border: 2px solid var(--gray-200);
      background: white; cursor: pointer; width: 100%; text-align: left;
      font-size: 14px; font-weight: 500; transition: all .15s; color: var(--gray-700);
      font-family: inherit; margin-bottom: 8px;
    }
    .type-btn:hover { border-color: var(--blue); background: var(--blue-light); }
    .type-btn.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
    .type-btn .type-icon { font-size: 22px; width: 28px; text-align: center; }

    /* ===== CLIENT BUTTONS ===== */
    .client-btn {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      border-radius: var(--radius); border: 1.5px solid var(--gray-200);
      background: white; cursor: pointer; width: 100%; text-align: left;
      font-size: 14px; transition: all .15s; color: var(--gray-700);
      font-family: inherit; margin-bottom: 6px;
    }
    .client-btn:hover { border-color: var(--blue); background: var(--blue-light); }
    .client-btn.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); font-weight: 500; }
    .client-btn .client-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--gray-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: var(--gray-600); flex-shrink: 0;
    }
    .client-info-name { font-weight: 500; }
    .client-info-phone { font-size: 12px; color: var(--gray-400); }

    /* ===== FILTER BAR ===== */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      padding: 12px 14px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
    }
    .filter-bar select { width: auto !important; font-size: 13px; padding: 6px 10px; }

    /* ===== ORDER STATUS BADGES ===== */
    .st-nuevo       { background: #dbeafe; color: #1d4ed8; }
    .st-revision    { background: #fef3c7; color: #92400e; }
    .st-aprobado    { background: #dcfce7; color: #15803d; }
    .st-rechazado   { background: #fee2e2; color: #991b1b; }
    .st-entregado   { background: #f3f4f6; color: #6b7280; }
    .st-entregando      { background: #ede9fe; color: #6d28d9; }
    .st-armando-remito  { background: #fef9c3; color: #854d0e; }

    /* ===== STOCK ===== */
    .stock-prod-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200); font-size: 14px;
    }

    /* ===== PRODUCT COLOR ROW ===== */
    .pc-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); margin-bottom: 5px; background: white;
    }
    .pc-row.pc-sel  { border-color: var(--blue); background: var(--blue-light); }
    .pc-row.pc-zero { opacity: .4; }

    /* ===== ORDER STEPS ===== */
    .order-step-item {
      display: flex; gap: 12px; padding: 9px 0;
      border-bottom: 1px solid var(--gray-100); font-size: 14px;
    }
    .order-step-item:last-child { border-bottom: none; }
    .order-step-icon { font-size: 17px; flex-shrink: 0; width: 22px; text-align: center; }
  </style>
</head>

async function dbProfile(uid) {

async function dbCompanies() {
  const { data } = await sb.from('companies').select('*').order('name');

async function dbSellers() {

async function dbClients(sellerId) {
  let q = sb.from('clients').select('*').eq('active',true).order('name');
  if (sellerId && sellerId !== 'all') q = q.eq('seller_id', sellerId);
  const { data } = await q;
  S.clients = data || [];
}
async function dbActions(year, month) {
  const from = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const to   = `${year}-${String(month+1).padStart(2,'0')}-${new Date(year,month+1,0).getDate()}`;
  let q = sb.from('calendar_actions')
    .select('*, clients(name), profiles(name, company_id)')
    .gte('date', from).lte('date', to)
    .order('date').order('created_at');
  if (S.profile.role === 'seller' || S.tab === 'micalendario') q = q.eq('seller_id', S.profile.id);
  else if (S.filterSeller !== 'all') q = q.eq('seller_id', S.filterSeller);
  const { data } = await q;
  S.actions = data || [];
}
async function dbAddAction(d) {
  const { error } = await sb.from('calendar_actions').insert({
    seller_id: S.profile.id, client_id: d.clientId,
    date: d.date, action_type: d.type, note: d.note || null, action_time: d.time || null,
  });
  return error;
}
async function dbRespond(id, text) {
  const { error } = await sb.from('calendar_actions')
    .update({ admin_response: text, admin_responded_at: new Date().toISOString() })
    .eq('id', id);
  return error;
}
async function dbDeleteAction(id) {
  await sb.from('calendar_actions').delete().eq('id', id);
}
async function dbAddClient(d) {
  const { error } = await sb.from('clients').insert({
    seller_id: d.sellerId, name: d.name, phone: d.phone||null,
    email: d.email||null, address: d.address||null, notes: d.notes||null, active: true,
    balance: parseFloat(d.balance)||0,
    balance_currency: d.balanceCurrency||'USD',
    cuit: d.cuit||null, locality: d.locality||null,
    delivery_address: d.deliveryAddress||null,
  });
  return error;
}
async function dbBulkClients(sellerId, rows) {
  // Formato extendido: Nombre, Saldo, Moneda(USD/ARS), Dirección, Localidad, CUIT, Teléfono, Dir.Entrega
  const ins = rows.map(r => {
    const name = (r[0]||'').trim();
    if (!name) return null;
    const rawBal = (r[1]||'0').toString().replace(/[$,\s]/g,'').replace(',','.');
    const balance = parseFloat(rawBal)||0;
    const moneda = (r[2]||'').toString().trim().toUpperCase();
    const balance_currency = moneda==='PESOS'||moneda==='ARS' ? 'ARS' : 'USD';
    return {
      seller_id: sellerId, name, active: true,
      balance, balance_currency,
      address:          (r[3]||null)||null,
      locality:         (r[4]||null)||null,
      cuit:             (r[5]||null)||null,
      phone:            (r[6]||null)||null,
      delivery_address: (r[7]||null)||null,
    };
  }).filter(Boolean);
  const { error } = await sb.from('clients').insert(ins);
  return { error, count: ins.length };
}
async function dbAddCollection(d) {
  const { error } = await sb.rpc('add_collection', {
    p_client_id:        d.clientId,
    p_seller_id:        S.profile.id,
    p_payment_type:     d.paymentType,
    p_amount:           d.amount,
    p_payment_currency: d.paymentCurrency,
    p_exchange_rate:    d.exchangeRate||null,
    p_amount_account:   d.amountAccount,
    p_date:             d.date,
    p_notes:            d.notes||null,
  });
  if (error) return error.message;
  // Refresh client balance locally
  const c = S.clients.find(x=>x.id===d.clientId);
  if (c) c.balance = (c.balance||0) + d.amountAccount;
  return null;
}
async function dbAllCollections() {
  const { data } = await sb.from('collections')
    .select('id, date, amount_account, payment_type, payment_currency, client_id, notes')
    .order('date', {ascending:false});
  S.allCollections = data || [];
}
async function dbCreateSeller(email, name, pass, companyId, role='seller') {
  const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { name } } });
  if (error) return error;
  if (data?.user) await sb.from('profiles').upsert({
    id: data.user.id, name, role, email, company_id: companyId || null,
  });
  return null;
}

// ----- CALENDAR -----
function vCalendar() {
  const { year: y, month: m, actions } = S;
  const today  = new Date();
  const first  = new Date(y, m, 1).getDay();
  const days   = new Date(y, m+1, 0).getDate();
  const prevD  = new Date(y, m, 0).getDate();

  const byDate = {};
  actions.forEach(a => { (byDate[a.date] = byDate[a.date]||[]).push(a); });

  let cells = DAYS.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  for (let i = 0; i < first; i++) {
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${prevD-first+i+1}</div></div>`;
  }
  for (let d = 1; d <= days; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const acts = byDate[ds] || [];
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    const dots = acts.map(a => `<div class="cal-dot" style="background:${ACTIONS[a.action_type]?.color||'#999'}"></div>`).join('');
    const cnt  = acts.length > 0 ? `<div class="cal-count">${acts.length}</div>` : '';
    cells += `<div class="cal-day${isToday?' today':''}" data-date="${ds}"><div class="cal-day-num">${d}</div><div class="cal-dots">${dots}</div>${cnt}</div>`;
  }
  const total = Math.ceil((first+days)/7)*7;
  for (let i = first+days+1; i <= total; i++) cells += `<div class="cal-day other-month"><div class="cal-day-num">${i-first-days}</div></div>`;

  return `
  <div class="card mb-0">
    <div class="card-body">
      <div class="cal-header">
        <button class="btn btn-secondary btn-sm" id="btnPrev">◀</button>
        <div class="cal-month">${MONTHS[m]} ${y}</div>
        <button class="btn btn-secondary btn-sm" id="btnNext">▶</button>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="text-muted mt-3" style="font-size:12px">Tocá un día para ver o registrar acciones</div>
    </div>
  </div>
  <button class="fab" id="btnFab">+</button>`;
}

function fmtBalance(c) {
  if (c.balance == null) return '—';
  const sym = c.balance_currency==='ARS' ? '$' : 'U$D';
  const abs = Math.abs(c.balance).toLocaleString('es-AR', {minimumFractionDigits:2,maximumFractionDigits:2});
  const color = c.balance < 0 ? 'var(--red)' : c.balance > 0 ? 'var(--green)' : 'var(--gray-400)';
  const sign = c.balance < 0 ? '-' : c.balance > 0 ? '+' : '';
  return `<span style="font-weight:600;color:${color}">${sign}${sym} ${abs}</span>`;
}
function syncRollInputs() {
  if (!S.newRemito) return;
  const order = S.orders.find(x => x.id === S.newRemito.orderId);
  if (!order) return;
  if (!S.newRemito.rolls) S.newRemito.rolls = {};
  (order.order_items||[]).forEach(oi => {
    const current = S.newRemito.rolls[oi.id] || Array(oi.quantity).fill('');
    S.newRemito.rolls[oi.id] = current.map((_, i) => {
      const el = document.getElementById(`fRoll_${oi.id}_${i}`);
      return el ? el.value : _;
    });
  });
}

    <button class="tab-btn ${sub==='pedidos'?'active':''}"  data-admin-vend-tab="pedidos">📋 Pedidos${badge}</button>
    <button class="tab-btn ${sub==='remitos'?'active':''}"  data-admin-vend-tab="remitos">🧾 Remitos</button>
  </div>`;
  let content = '';
  if      (sub==='equipo')  content = vAdminVendedores();
  else if (sub==='pedidos') content = vPedidos();
  else if (sub==='remitos') content = vRemitos();
  return subNav + content;
}

// ── ADMIN LOCALES SECTION ─────────────────────────────────────────────────────
function vAdminLocalesSection() {
  const locals  = S.locals || [];
  if (!S.adminLocalId && locals.length>0) S.adminLocalId = locals[0].id;
  const selId   = S.adminLocalId;
  const subTab  = S.adminLocalSubTab || 'activos';

  // Mark admin context so vLocalActivos/vLocalDespachados know
  S.adminViewLocalId = selId || null;

  const storeBtns = locals.map(l=>
    '<button class="tab-btn '+(l.id===selId?'active':'')+'" data-admin-local-id="'+l.id+'">'+(l.name||'Local')+'</button>'
  ).join('');

  if (!selId) return `<div class="subnav">${storeBtns}</div>
    <div class="empty-state" style="padding:40px"><div class="empty-icon">🏪</div>Seleccioná un local</div>`;

  const subNav2 = `<div class="subnav" style="background:white">
    <button class="tab-btn ${subTab==='activos'?'active':''}"     data-admin-local-sub="activos">📋 Activos</button>
    <button class="tab-btn ${subTab==='despachados'?'active':''}" data-admin-local-sub="despachados">📦 Despachados</button>
    <span style="flex:1"></span>
    <button class="btn btn-sm btn-secondary" id="btnReloadAdminLocal" style="margin:auto 0">↺ Actualizar</button>
  </div>`;

  // Temporarily swap S.localOrders with the selected local's orders

  return `<div class="subnav">${storeBtns}</div>${subNav2}${content}`;

// ── ADMIN PAGOS ──────────────────────────────────────────────────────────────
function vAdminPagos() {
  const sub  = S.pagosTab || 'nuevo';
  const form = S.pagosForm || {};
  const pt   = form.cobPayType||'';
  const amt  = form.cobAmount||'';
  const tc   = form.cobTC||'';

  const subNav = `<div class="subnav">
    <button class="tab-btn${sub==='nuevo'?' active':''}" data-pagos-tab="nuevo">➕ Nuevo pago</button>
    <button class="tab-btn${sub==='consultar'?' active':''}" data-pagos-tab="consultar">📋 Consultar pagos</button>
  </div>`;

  // ── NUEVO PAGO ──────────────────────────────────────────────────────────────
  if (sub === 'nuevo') {
    const sq = (S.pagosClientSearch||'').toLowerCase().trim();
    const clients = (S.clients||[]).filter(c=>!sq||c.name.toLowerCase().includes(sq));
    const sel = S.pagosClientId ? (S.clients||[]).find(c=>c.id===S.pagosClientId) : null;
    const cur = sel?.balance_currency||'USD';
    const needsTC = sel && cur==='USD' && pt && pt!=='efectivo_usd';

    const clientRows = clients.map(c=>`<tr style="cursor:pointer${S.pagosClientId===c.id?';background:var(--blue-50)':''}" data-pagos-client="${c.id}">
      <td><strong>${c.name}</strong></td>
      <td>${(S.sellers||[]).find(s=>s.id===c.seller_id)?.name||'—'}</td>
      <td>${fmtBalance(c)}</td>
    </tr>`).join('') || `<tr><td colspan="3" style="text-align:center;color:var(--gray-400);padding:16px">Sin clientes</td></tr>`;

    const payForm = sel ? `
      <div class="card mt-3" style="padding:16px">
        <div class="card-title" style="margin-bottom:12px">💳 Registrar pago — <strong>${sel.name}</strong>
          <span style="font-size:12px;margin-left:8px;color:var(--gray-500)">Saldo: ${fmtBalance(sel)}</span>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
          <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Forma de pago</div>
            <select id="fPagosPayType" style="min-width:160px">
              <option value="">Seleccionar...</option>
              <option value="efectivo_ars" ${pt==='efectivo_ars'?'selected':''}>Efectivo $</option>
              <option value="efectivo_usd" ${pt==='efectivo_usd'?'selected':''}>Efectivo U$D</option>
              <option value="transferencia" ${pt==='transferencia'?'selected':''}>Transferencia</option>
              <option value="cheque" ${pt==='cheque'?'selected':''}>Cheque</option>
              <option value="otro" ${pt==='otro'?'selected':''}>Otro</option>
            </select>
          </div>
          <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Monto cobrado</div>
            <input type="number" id="fPagosAmt" min="0" step="0.01" placeholder="0.00" value="${amt}" style="width:120px">
          </div>
          ${needsTC ? `<div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Tipo de cambio</div>
            <input type="number" id="fPagosTC" min="0" step="0.01" placeholder="0.00" value="${tc}" style="width:100px">
          </div>` : ''}
          <div><button class="btn btn-primary" id="btnAplicarPago">✅ Aplicar pago</button></div>
        </div>
        <div id="pagosMsg" style="margin-top:8px;font-size:13px;color:var(--green)"></div>
      </div>` : '';

    return `${subNav}
    <div style="padding:12px 0 0">
      <input type="text" id="fPagosClientSearch" placeholder="🔍 Buscar cliente..." value="${S.pagosClientSearch||''}" style="max-width:280px">
    </div>
    <div class="table-wrap mt-2">
      <table><thead><tr><th>Cliente</th><th>Vendedor</th><th>Saldo</th></tr></thead>
        <tbody>${clientRows}</tbody>
      </table>
    </div>
    ${payForm}`;
  }

  // ── CONSULTAR PAGOS ─────────────────────────────────────────────────────────
  const sort   = S.pagosColSort || {col:'fecha',dir:'desc'};
  const colSq  = (S.pagosColSearch||'').toLowerCase().trim();
  const colPT  = S.pagosColPayType||'';
  const colCur = S.pagosColCurrency||'';
  const fmtPT  = t => ({efectivo_ars:'Efectivo $',efectivo_usd:'Efectivo U$D',transferencia:'Transferencia',cheque:'Cheque',otro:'Otro'}[t]||t||'—');

  let rows = (S.allCollections||[]).map(col => {
    const cli = (S.clients||[]).find(c=>c.id===col.client_id);
    return { ...col, clientName: cli?.name||'—' };
  });
  if (colSq)  rows = rows.filter(r=>r.clientName.toLowerCase().includes(colSq));
  if (colPT)  rows = rows.filter(r=>r.payment_type===colPT);
  if (colCur) rows = rows.filter(r=>r.payment_currency===colCur);

  const colKey = {fecha:'date',cliente:'clientName',paytype:'payment_type',moneda:'payment_currency',monto:'amount_account'};
  rows.sort((a,b)=>{
    const k=colKey[sort.col]||'date';
    let va=a[k]||'', vb=b[k]||'';
    if(sort.col==='monto'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
    const c=va<vb?-1:va>vb?1:0; return sort.dir==='asc'?c:-c;
  });

  const thC = (lbl,col) => {
    const act=sort.col===col, arr=act?(sort.dir==='asc'?' ↑':' ↓'):'';
    return `<th style="cursor:pointer;white-space:nowrap" data-pagos-col-sort="${col}">${lbl}${arr}</th>`;
  };

  const tableRows = rows.length ? rows.map(r=>`<tr>
    <td>${r.date||'—'}</td>
    <td>${r.clientName}</td>
    <td>${fmtPT(r.payment_type)}</td>
    <td>${r.payment_currency||'—'}</td>
    <td style="text-align:right">${parseFloat(r.amount_account||0).toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
  </tr>`).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:16px">Sin pagos registrados</td></tr>`;

  return `${subNav}
  <div style="display:flex;gap:8px;flex-wrap:wrap;padding:12px 0 0;align-items:center">
    <input type="text" id="fPagosColSearch" placeholder="🔍 Buscar cliente..." value="${S.pagosColSearch||''}" style="max-width:220px">
    <select id="fPagosColPayType" style="min-width:160px">
      <option value="">Todas las formas de pago</option>
      <option value="efectivo_ars" ${colPT==='efectivo_ars'?'selected':''}>Efectivo $</option>
      <option value="efectivo_usd" ${colPT==='efectivo_usd'?'selected':''}>Efectivo U$D</option>
      <option value="transferencia" ${colPT==='transferencia'?'selected':''}>Transferencia</option>
      <option value="cheque" ${colPT==='cheque'?'selected':''}>Cheque</option>
      <option value="otro" ${colPT==='otro'?'selected':''}>Otro</option>
    </select>
    <select id="fPagosColCurrency" style="min-width:120px">
      <option value="">Todas las monedas</option>
      <option value="ARS" ${colCur==='ARS'?'selected':''}>ARS</option>
      <option value="USD" ${colCur==='USD'?'selected':''}>USD</option>
    </select>
  </div>
  <div class="table-wrap mt-2">
    <table><thead><tr>
      ${thC('Fecha','fecha')}${thC('Cliente','cliente')}${thC('Forma de pago','paytype')}${thC('Moneda','moneda')}${thC('Monto','monto')}
    </tr></thead><tbody>${tableRows}</tbody></table>
  </div>`;
}

// ----- ADMIN: REPORTES -----
function vAdminReportes() {
  const rptActions = isOwner() && S.filterCompany !== 'all'
    ? S.actions.filter(a => a.profiles?.company_id === S.filterCompany)
    : S.actions;
  const cnt  = t => rptActions.filter(a=>a.action_type===t).length;
  const total = rptActions.length;
  const withResp = rptActions.filter(a=>a.admin_response).length;

  const statCards = Object.entries(ACTIONS).map(([k,v]) => `
    <div class="stat-box">
      <div style="font-size:24px">${v.icon}</div>
      <div class="stat-num" style="color:${v.color}">${cnt(k)}</div>
      <div class="stat-label">${v.label}</div>
    </div>`).join('');

  const selOpts = MONTHS.map((n,i)=>`<option value="${i}"${S.month===i?' selected':''}>${n}</option>`).join('');
  const yearOpts = [2024,2025,2026,2027].map(y=>`<option value="${y}"${S.year===y?' selected':''}>${y}</option>`).join('');

  const visibleSellersRpt = isOwner() && S.filterCompany !== 'all'
    ? S.sellers.filter(s => s.company_id === S.filterCompany)
    : S.sellers;

  const sellerRows = [...visibleSellersRpt].sort((a,b)=>{
    const ca = rptActions.filter(x=>x.seller_id===a.id).length;
    const cb = rptActions.filter(x=>x.seller_id===b.id).length;
    return cb - ca;
  }).map(s => {
    const a = rptActions.filter(x=>x.seller_id===s.id);
    return `<tr>
      <td><strong>${s.name}</strong>${isOwner()?` ${companyBadge(s.company_id)}`:''}</td>
      <td style="text-align:center;font-weight:700">${a.length}</td>
      ${Object.keys(ACTIONS).map(k=>`<td style="text-align:center">${a.filter(x=>x.action_type===k).length}</td>`).join('')}
      <td style="text-align:center">${a.filter(x=>x.admin_response).length}</td>
    </tr>`;
  }).join('');

  return `
  <div class="card mb-4">
    <div class="card-header">
      <div class="card-title">Reporte — ${MONTHS[S.month]} ${S.year}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <select id="rptMonth" style="width:auto !important">${selOpts}</select>
        <select id="rptYear"  style="width:auto !important">${yearOpts}</select>
        <button class="btn btn-secondary btn-sm" id="btnRptReload">Ver</button>
      </div>
    </div>
    <div class="stats-grid">
      ${statCards}
      <div class="stat-box"><div style="font-size:24px">📋</div><div class="stat-num">${total}</div><div class="stat-label">Total acciones</div></div>
      <div class="stat-box"><div style="font-size:24px">💬</div><div class="stat-num" style="color:var(--green)">${withResp}</div><div class="stat-label">Respondidas</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Detalle por vendedor</div></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Vendedor</th><th style="text-align:center">Total</th>
          ${Object.values(ACTIONS).map(v=>`<th style="text-align:center">${v.icon}</th>`).join('')}
          <th style="text-align:center">Resp.</th>
        </tr></thead>
        <tbody>${sellerRows||`<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--gray-400)">Sin datos</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;
}

    ? `<div class="empty-state"><div class="empty-icon">📭</div>Sin acciones registradas</div>`
    : acts.map(a => `
      <div class="action-item">
        <div class="action-item-header">
          <div class="action-meta">
            ${pill(a.action_type)}
            <span class="client-tag">👤 ${a.clients?.name||'Sin cliente'}</span>
          </div>
          ${(isAdmin() && S.tab !== 'micalendario')
            ? `<button class="btn btn-sm btn-secondary" data-respond="${a.id}" style="flex-shrink:0">✏️ Resp.</button>`

function mAddAction() {
  const { addStep: step, addData: d } = S;
  const myClients = S.clients.filter(c=>c.seller_id===S.profile.id);

  const stepCls = n => step>n?'done':step===n?'active':'';

  let body = '';
  if (step === 1) {
    body = `
      <p class="text-sm text-muted mb-3">¿Qué tipo de acción realizaste?</p>
      ${Object.entries(ACTIONS).map(([k,v])=>`
        <button class="type-btn${d.type===k?' selected':''}" data-type="${k}">
          <span class="type-icon">${v.icon}</span>
          <span>${v.label}</span>
        </button>`).join('')}`;
  } else if (step === 2) {
    if (myClients.length === 0) {
      body = `
        <div class="alert alert-error mb-3">No tenés clientes en tu cartera. Primero agregá clientes desde "Mi cartera".</div>`;
    } else {
      body = `
        <p class="text-sm text-muted mb-3">¿Con qué cliente?</p>
        <div style="max-height:52vh;overflow-y:auto">
          ${myClients.map(c=>`
            <button class="client-btn${d.clientId===c.id?' selected':''}" data-client="${c.id}" data-cname="${c.name}">
              <div class="client-avatar">${avatar(c.name)}</div>
              <div>
                <div class="client-info-name">${c.name}</div>
                ${c.phone?`<div class="client-info-phone">${c.phone}</div>`:''}
              </div>
            </button>`).join('')}
        </div>`;
    }
  } else {
    const client = S.clients.find(c=>c.id===d.clientId);
    const clientCur = client?.balance_currency||'USD';

    if (d.type==='entrega') {
      // Mostrar remitos en borrador para este cliente
      const clientRemitos = (S.remitos||[]).filter(r=>r.client_id===d.clientId && r.status==='borrador');
      const selRemito = d.delivRemitoId ? clientRemitos.find(r=>r.id===d.delivRemitoId) : null;

      const remitoOpts = clientRemitos.map(r=>{
        const orderNum = r.orders?.order_number || S.orders.find(o=>o.id===r.order_id)?.order_number || '—';
        return `<option value="${r.id}"${d.delivRemitoId===r.id?' selected':''}>${r.remito_number} · ${orderNum}</option>`;
      }).join('');

      body = `
        <p class="text-sm text-muted mb-3">🚚 Entrega · <strong>${d.clientName}</strong></p>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="fDate" value="${d.date||S.selDate||todayStr()}" max="${todayStr()}">
          </div>
        </div>
        <div class="form-group">
          <label>Remito a impactar</label>
          <select id="fDelivRemito">
            <option value="">— Seleccioná un remito —</option>
            ${remitoOpts}
          </select>
          ${clientRemitos.length===0?`<div class="alert alert-info mt-2" style="font-size:12px">⚠️ No hay remitos en borrador para este cliente. Primero creá un remito desde la pestaña <strong>Remitos</strong>.</div>`:''}
        </div>
        ${selRemito?`
        <div style="background:var(--gray-50);border-radius:var(--radius);padding:10px;font-size:12px;margin-bottom:8px">
          <div style="font-weight:600;margin-bottom:4px">${selRemito.remito_number} · ${selRemito.orders?.order_number||''}</div>
          <div style="color:var(--gray-500)">${(selRemito.remito_items||[]).length} registros de rollos</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <input type="checkbox" id="fCloseOrder" ${d.closeOrder?'checked':''}>
          <label for="fCloseOrder" style="font-size:13px;cursor:pointer">Entrega final (cerrar pedido)</label>
        </div>`:''}
        <div class="form-group mb-0">
          <label>Nota (opcional)</label>
          <textarea id="fNote" placeholder="Ej: entrega conforme remito...">${d.note||''}</textarea>
        </div>`;
    } else {
      // Otros tipos (cobranza, visita, llamado, etc.)
      let cobranzaForm = '';
      if (d.type==='cobranza' && isAdmin()) {
        const pt = d.cobPayType||'';
        const needsTC = clientCur==='USD' && pt && pt!=='efectivo_usd';

function statusBadge(status) {

function formatPayment(o) {
  if (!o?.paymentType) return '—';
  const note = o.paymentNote ? ` · ${o.paymentNote}` : '';
  switch (o.paymentType) {
    case 'cheque': {
      const terms = o.chequeTerms?.length > 0
        ? o.chequeTerms.map(t => t===0?'Contado':t+'d').join(', ') : '—';
      return `Cheque: ${terms}${note}`;
    }
    case 'transferencia': return `Transferencia a ${o.transferDays||'?'} días${note}`;
    case 'contraentrega':
      return `Contraentrega ${o.ceType==='fecha'?`el ${o.ceDate}`:'inmediata'}${note}`;
    case 'cuenta_corriente': return `Cta cte efectivo ${o.ccTerm||'?'} días${note}`;
    default: return o.paymentType;
  }
}
function formatPaymentFromOrder(o) {
  const d = o.payment_details || {};
  const note = d.note ? ` · ${d.note}` : '';
  switch (o.payment_type) {
    case 'cheque': {
      const terms = d.cheque_terms?.length > 0
        ? d.cheque_terms.map(t => t===0?'Contado':t+'d').join(', ') : '—';
      return `Cheque: ${terms}${note}`;
    }
    case 'transferencia': return `Transferencia a ${d.transfer_days||'?'} días${note}`;
    case 'contraentrega':
      return `Contraentrega ${d.ce_type==='fecha'?`el ${d.ce_date}`:'inmediata'}${note}`;
    case 'cuenta_corriente': return `Cta cte efectivo ${d.cc_term||'?'} días${note}`;
    default: return o.payment_type||'—';
  }
}

async function dbProducts() {
  const { data } = await sb.from('products')
    .select('*, product_colors(*)')
    .eq('active', true)
    .order('name');
  (data||[]).forEach(p => (p.product_colors||[]).sort((a,b)=>a.color.localeCompare(b.color)));
  S.products = data || [];
}

// CSV format: ARTICULO, COLOR, qty1, qty2, ... (qty cols summed = total)
async function dbBulkStock(rows, mode) {
  const bulltexCo = S.companies.find(c => c.name === 'Bulltex');
  if (!bulltexCo) return 'No se encontró la empresa Bulltex';
  for (const row of rows) {
    const name  = row[0]?.trim();
    const color = row[1]?.trim();
    if (!name || !color) continue;
    // Sum all numeric columns from index 2 onwards
    let qty = 0;
    for (let i = 2; i < row.length; i++) {
      const n = parseInt(row[i]);
      if (!isNaN(n) && n >= 0) qty += n;
    }
    // Find or create product
    let { data: prod } = await sb.from('products').select('id')
      .eq('company_id', bulltexCo.id).ilike('name', name).maybeSingle();
    if (!prod) {
      const { data: np, error: pe } = await sb.from('products')
        .insert({ company_id: bulltexCo.id, name }).select('id').single();
      if (pe) return pe.message;
      prod = np;
    }
    let finalQty = qty;
    if (mode === 'add') {
      const { data: ex } = await sb.from('product_colors').select('total_stock')
        .eq('product_id', prod.id).eq('color', color).maybeSingle();
      finalQty = (ex?.total_stock||0) + qty;
    }
    const { error: ce } = await sb.from('product_colors').upsert(
      { product_id: prod.id, color, total_stock: finalQty, updated_at: new Date().toISOString() },
      { onConflict: 'product_id,color' }
    );
    if (ce) return ce.message;
  }
  await dbProducts();
  return null;
}

async function dbUpdateStockItem(productColorId, newTotal) {
  const { error } = await sb.from('product_colors')
    .update({ total_stock: newTotal, updated_at: new Date().toISOString() })
    .eq('id', productColorId);
  if (error) return error.message;
  await dbProducts();
  return null;
}

async function dbCreateOrder(orderData, items) {
  const bulltexCo = S.companies.find(c => c.name === 'Bulltex');
  const payDet = {
    cheque_terms: orderData.chequeTerms||[],
    transfer_days: orderData.transferDays||'',
    ce_type: orderData.ceType||'inmediata',
    ce_date: orderData.ceDate||'',
    cc_term: orderData.ccTerm||'',
    note: orderData.paymentNote||'',
  };
  if (S.editOrderId) {
    const { error: ue } = await sb.from('orders').update({
      payment_type: orderData.paymentType, payment_details: payDet,
      invoiced: orderData.invoiced,
      delivery_address: orderData.deliveryAddress||null,
      delivery_type: orderData.deliveryType||null,
      delivery_datetime: orderData.deliveryDatetime||null,
      seller_note: orderData.sellerNote||null,
      status: 'en_revision', pending_actor: 'admin',
      updated_at: new Date().toISOString(),
    }).eq('id', S.editOrderId);
    if (ue) return ue.message;
    await sb.from('order_items').delete().eq('order_id', S.editOrderId);
    if (items.length) {
      const { error: ie } = await sb.from('order_items').insert(
        items.map(i => ({ order_id: S.editOrderId, product_color_id: i.productColorId, quantity: i.quantity, price: i.price||null, price_currency: i.priceCurrency||null }))
      );
      if (ie) return ie.message;
    }
    await sb.from('order_history').insert({
      order_id: S.editOrderId, actor_id: S.profile.id,
      action: 'resubmitted', note: orderData.sellerNote||null
    });
    return null;
  }
  const { data: ord, error: oe } = await sb.from('orders').insert({
    seller_id: S.profile.id,
    client_id: orderData.clientId||null,
    company_id: bulltexCo?.id || S.profile.company_id,
    payment_type: orderData.paymentType, payment_details: payDet,
    invoiced: orderData.invoiced,
    delivery_address: orderData.deliveryAddress||null,
    delivery_type: orderData.deliveryType||null,
    delivery_datetime: orderData.deliveryDatetime||null,
    seller_note: orderData.sellerNote||null,
    status: 'nuevo', pending_actor: 'admin',
  }).select().single();
  if (oe) return oe.message;
  if (items.length) {
    const { error: ie } = await sb.from('order_items').insert(
      items.map(i => ({ order_id: ord.id, product_color_id: i.productColorId, quantity: i.quantity, price: i.price||null, price_currency: i.priceCurrency||null }))
    );
    if (ie) return ie.message;
  }
  await sb.from('order_history').insert({
    order_id: ord.id, actor_id: S.profile.id,
    action: 'submitted', note: orderData.sellerNote||null
  });
  return null;
}

  const { error } = await sb.from('orders').update({

  if (error) return error.message;
  await sb.from('order_history').insert({

  return null;
}

async function dbCreateRemito(data) {
  const { data: remito, error: re } = await sb.from('remitos').insert({
    order_id:   data.orderId,
    seller_id:  data.sellerId,
    client_id:  data.clientId,
    created_by: S.profile.id,
    tc:         data.tc || null,
    notes:      data.notes || null,
  }).select().single();
  if (re) return re.message;
  const rollItems = [];
  (data.items || []).forEach(item => {
    (item.rolls || []).forEach((qty, idx) => {
      if (parseFloat(qty) > 0) {
        rollItems.push({ remito_id: remito.id, order_item_id: item.orderItemId, roll_number: idx + 1, quantity: parseFloat(qty), unit: item.unit });
      }
    });
  });
  if (!rollItems.length) { await sb.from('remitos').delete().eq('id', remito.id); return 'Ingresá al menos una cantidad'; }
  const { error: ri } = await sb.from('remito_items').insert(rollItems);
  if (ri) return ri.message;
  await sb.from('orders').update({ status: 'armando_remito', pending_actor: 'admin', updated_at: new Date().toISOString() }).eq('id', data.orderId).in('status', ['aprobado','armando_remito']);
  await sb.from('order_history').insert({ order_id: data.orderId, actor_id: S.profile.id, action: 'partial_delivery', note: 'Remito ' + remito.remito_number + ' creado' });
  S.remitoDetail = { ...remito, remito_items: rollItems };
  return null;
}

async function dbApplyRemito(remitoId, closeOrder) {
  const { error } = await sb.rpc('apply_remito', { p_remito_id: remitoId, p_close_order: closeOrder });
  if (error) return error.message;
  const r = S.remitos.find(x => x.id === remitoId);
  if (r) {
    r.status = 'entregado';
    const c = S.clients.find(x => x.id === r.client_id);
    // Approximate balance update (exact from DB on next reload)
    if (c) await dbClients(isAdmin() ? 'all' : S.profile.id);
  }
  return null;
}

async function dbDeleteRemito(remitoId) {
  const r = S.remitos.find(x => x.id === remitoId);
  const { error } = await sb.from('remitos').delete().eq('id', remitoId);
  if (error) return error.message;
  if (r) {
    // Revert order status to aprobado if no other remitos remain
    const others = S.remitos.filter(x => x.id !== remitoId && x.order_id === r.order_id && x.status === 'borrador');
    if (!others.length) await sb.from('orders').update({ status: 'aprobado', pending_actor: 'admin', updated_at: new Date().toISOString() }).eq('id', r.order_id).eq('status', 'armando_remito');
  }
  S.remitos = S.remitos.filter(x => x.id !== remitoId);
  return null;
}

// Returns the subset of profiles the current user is allowed to invite to a meeting
function meetingTargets(all) {
  const myRole    = S.profile.role;
  const myCompany = companyName(S.profile.company_id);
  const co        = p => companyName(p.company_id);
  if (myRole === 'owner') return all;
  if (myRole === 'seller' && myCompany === 'Bulltex')
    return all.filter(p => p.role==='owner' || (p.role==='admin' && co(p)==='Bulltex'));
  if (myRole === 'admin'  && myCompany === 'Bulltex')
    return all.filter(p => p.role==='owner' || (p.role==='seller' && co(p)==='Bulltex') || p.role==='local');
  if (myRole === 'seller' && myCompany !== 'Bulltex')
    return all.filter(p => p.role==='owner' || ((p.role==='admin'||p.role==='seller') && co(p)===myCompany));
  if (myRole === 'admin'  && myCompany !== 'Bulltex')
    return all.filter(p => p.role==='owner' || (p.role==='seller' && co(p)===myCompany));
  if (myRole === 'local')
    return all.filter(p => p.role==='owner' || ((p.role==='admin'||p.role==='seller') && co(p)!=='Bulltex'));
  return all;
}

async function dbMeetingRequests() {
  const { data } = await sb.from('meeting_requests')
    .select('*, from_profile:from_user_id(id,name), to_profile:to_user_id(id,name)')
    .or(`from_user_id.eq.${S.profile.id},to_user_id.eq.${S.profile.id}`)
    .order('created_at',{ascending:false});
  S.meetingRequests = data || [];
  // Count items needing MY attention:
  // - requests sent TO me that are 'pending'
  // - counter-proposals sent TO me (status='counter', from_user_id = other)
  S.meetingPending = S.meetingRequests.filter(r=>
    (r.to_user_id===S.profile.id && r.status==='pending') ||
    (r.from_user_id===S.profile.id && r.status==='counter')
  ).length;
}
async function dbCreateMeeting(d) {
  const { error } = await sb.from('meeting_requests').insert({
    from_user_id: S.profile.id,
    to_user_id:   d.toUserId,
    proposed_date: d.date,
    proposed_time: d.time || null,
    note:          d.note || null,
    status:        'pending',
  });
  if (error) return error.message;
  // Also add to requester's calendar
  await dbAddAction({ type:'reunion', clientId:null, clientName:'', date:d.date, note:`Reunión solicitada con ${d.toName}${d.note?': '+d.note:''}`, time:d.time||null });
  return null;
}
async function dbRespondMeeting(id, action, counterData) {
  if (action==='accept') {
    const { error } = await sb.from('meeting_requests').update({status:'accepted'}).eq('id',id);
    if (error) return error.message;
    // Add to my calendar
    const req = S.meetingRequests.find(r=>r.id===id);
    if (req) {
      await dbAddAction({ type:'reunion', clientId:null, clientName:'', date:req.proposed_date,
        note:`Reunión confirmada con ${req.from_profile?.name||'?'}${req.note?': '+req.note:''}`,
        time:req.proposed_time||null });
    }
  } else if (action==='reject') {
    const { error } = await sb.from('meeting_requests').update({status:'rejected'}).eq('id',id);
    if (error) return error.message;
  } else if (action==='counter') {
    const { error } = await sb.from('meeting_requests').update({
      status:'counter', counter_date:counterData.date,
      counter_time:counterData.time||null, counter_note:counterData.note||null,
    }).eq('id',id);
    if (error) return error.message;
  } else if (action==='accept-counter') {
    const req = S.meetingRequests.find(r=>r.id===id);
    const { error } = await sb.from('meeting_requests').update({status:'accepted'}).eq('id',id);
    if (error) return error.message;
    if (req) {
      await dbAddAction({ type:'reunion', clientId:null, clientName:'', date:req.counter_date||req.proposed_date,
        note:`Reunión confirmada con ${req.to_profile?.name||'?'}${req.counter_note?': '+req.counter_note:''}`,
        time:req.counter_time||null });
    }
  }
  await dbMeetingRequests();
  return null;
}

async function dbCreateLocalOrder(draft) {
  const { data: ord, error: e1 } = await sb.from('local_orders').insert({
    local_id: draft.localId,
    client_id: draft.clientId || null,
    created_by: S.profile.id,
    move_type: draft.moveType || 'venta',
    notes: draft.notes || null,
    payment_status: draft.paymentStatus || 'pendiente',
    payment_amount: draft.paymentAmount || null,
    payment_currency: draft.paymentCurrency || 'ARS',
    payment_type: draft.paymentType || null,
  }).select().single();
  if (e1) return e1.message;
  for (const item of draft.items || []) {
    const { data: oi, error: e2 } = await sb.from('local_order_items').insert({
      local_order_id: ord.id,
      product_color_id: item.productColorId,
      price: item.price || null,
      price_currency: item.priceCurrency || 'ARS',
    }).select().single();
    if (e2) return e2.message;
    for (let i = 0; i < (item.rolls || []).length; i++) {
      const kg = parseFloat(item.rolls[i]) || 0;
      const { error: e3 } = await sb.from('local_order_rolls').insert({
        local_order_item_id: oi.id, roll_number: i + 1, quantity: kg,
      });
      if (e3) return e3.message;
    }
  }
  return null;
}

async function dbSaveLocalOrderItems(orderId, items) {

      price_currency: item.priceCurrency || 'ARS',
    }).select().single();

    for (let i = 0; i < (item.rolls || []).length; i++) {

      await sb.from('local_order_rolls').insert({

      });
    }
  }
  return null;
}

async function dbAdjustLocalOrderStock(orderId, direction) {
  // direction: -1 = deduct (venta/reserva dispatch), +1 = add (devolucion returned)
  const order = S.localOrders.find(o => o.id === orderId);
  if (!order) return;
  const grouped = {};
  for (const item of (order.local_order_items || [])) {
    const pcId = item.product_color_id;
    const kg = (item.local_order_rolls || []).reduce((s, r) => s + parseFloat(r.quantity || 0), 0);
    grouped[pcId] = (grouped[pcId] || 0) + kg;
  }
  for (const [pcId, kg] of Object.entries(grouped)) {
    const { data: pc } = await sb.from('product_colors').select('total_stock').eq('id', pcId).single();
    if (pc) {
      const newStock = Math.max(0, (pc.total_stock || 0) + direction * kg);
      await sb.from('product_colors').update({ total_stock: newStock, updated_at: new Date().toISOString() }).eq('id', pcId);
    }
  }
  await dbProducts();
}

async function dbReturnLocalOrder(orderId) {

    status: 'devuelto', dispatched_at: new Date().toISOString(),
  }).eq('id', orderId);
  if (error) return error.message;
  await dbAdjustLocalOrderStock(orderId, +1);
  return null;
}

async function dbDispatchLocalOrder(orderId, dispatchType) {
  const order = S.localOrders.find(o => o.id === orderId);
  const { error } = await sb.from('local_orders').update({
    status: 'despachado', dispatch_type: dispatchType, dispatched_at: new Date().toISOString(),
  }).eq('id', orderId);
  if (error) return error.message;
  // Deduct stock for venta/reserva; devolución adds stock when "devuelto" is clicked
  if (order && (order.move_type === 'venta' || order.move_type === 'reserva')) {
    await dbAdjustLocalOrderStock(orderId, -1);
  }
  return null;
}

    </table></div>
  </div>`;
}

// ----- MODALS: NEW ORDER -----
function mNewOrder() {
  const o = S.newOrder;
  if (!o) return '';
  const step = o.step;
  const myClients = S.clients.filter(c => c.seller_id === S.profile.id);
  let body = '';

  if (step === 1) {
    body = `<p class="text-sm text-muted mb-3">¿Para qué cliente?</p>
      <div style="max-height:50vh;overflow-y:auto">
        ${myClients.length===0
          ? `<div class="alert alert-error">No tenés clientes. Agregá desde "Mi Cartera" primero.</div>`
          : myClients.map(c=>`<button class="client-btn${o.clientId===c.id?' selected':''}" data-oc="${c.id}" data-ocname="${c.name}" data-ocaddr="${c.address||''}">
              <div class="client-avatar">${avatar(c.name)}</div>
              <div><div class="client-info-name">${c.name}</div>${c.address?`<div class="client-info-phone">${c.address}</div>`:''}</div>
             </button>`).join('')}
      </div>`;

  } else if (step === 2) {
    const ptypes=[['cheque','💳','Cheque'],['transferencia','💸','Transferencia'],['contraentrega','🚚','Contraentrega'],['cuenta_corriente','📒','Cta cte en efectivo']];
    let details='';
    if (o.paymentType==='cheque') {
      details=`<div class="mt-3"><label class="mb-2">Plazos (uno o más)</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
          ${[0,15,30,60,90,120].map(t=>`<button class="comp-btn${o.chequeTerms.includes(t)?' active':''}" data-ct="${t}">${t===0?'Contado':t+' días'}</button>`).join('')}
        </div></div>`;
    } else if (o.paymentType==='transferencia') {
      details=`<div class="form-group mt-3 mb-0"><label>¿A cuántos días transfiere?</label>
        <input type="text" id="fTransDays" placeholder="Ej: 15" value="${o.transferDays}"></div>`;
    } else if (o.paymentType==='contraentrega') {
      details=`<div class="mt-3"><label class="mb-2">Tipo</label>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <button class="comp-btn${o.ceType==='inmediata'?' active':''}" data-cet="inmediata">Inmediata</button>
          <button class="comp-btn${o.ceType==='fecha'?' active':''}" data-cet="fecha">Fecha específica</button>
        </div>
        ${o.ceType==='fecha'?`<div class="form-group mb-0"><label>Fecha</label><input type="date" id="fCEDate" value="${o.ceDate}"></div>`:''}</div>`;
    } else if (o.paymentType==='cuenta_corriente') {
      details=`<div class="form-group mt-3 mb-0"><label>Plazo (días)</label>
        <input type="text" id="fCCTerm" placeholder="Ej: 30" value="${o.ccTerm}"></div>`;
    }
    body=`<p class="text-sm text-muted mb-3">¿Cómo va a pagar?</p>
      ${ptypes.map(([v,ic,l])=>`<button class="type-btn${o.paymentType===v?' selected':''}" data-pt="${v}">
        <span class="type-icon">${ic}</span><span>${l}</span></button>`).join('')}
      ${details}
      <div class="form-group mt-3 mb-0"><label>Nota (opcional)</label>
        <input type="text" id="fPayNote" placeholder="Aclaraciones..." value="${o.paymentNote}"></div>`;

  } else if (step === 3) {
    const totalRollos = o.items.reduce((s,i)=>s+i.quantity,0);

    body=`
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <input type="text" id="fStockSearch" placeholder="🔍 Buscar artículo o color..." value="${o.searchQuery||''}"
          style="flex:1;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px" autocomplete="off">
        <span id="step3Badge" style="background:var(--blue);color:white;border-radius:99px;padding:3px 10px;font-size:13px;white-space:nowrap;font-weight:600;display:${totalRollos>0?'inline':'none'}">${totalRollos} rollo${totalRollos!==1?'s':''}</span>
      </div>
      <div style="display:flex;gap:10px;height:46vh">
        <div id="step3List" style="flex:1;overflow-y:auto">
          ${S.products.map(prod=>`
            <div class="prod-group" data-prod="${prod.name.toLowerCase()}" style="margin-bottom:12px">
              <div style="font-weight:700;font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;padding:0 2px">${prod.name}</div>
              ${(prod.product_colors||[]).map(pc=>{
                const avail=pc.total_stock-pc.reserved_stock;
                const item=o.items.find(i=>i.productColorId===pc.id);
                const qty=item?.quantity||0;
                return `<div class="pc-row${qty>0?' pc-sel':''}${avail===0?' pc-zero':''}" data-color="${pc.color.toLowerCase()}" data-prodname="${prod.name.toLowerCase()}">
                  <div style="flex:1">
                    <span style="font-weight:500;font-size:13px">${pc.color}</span>
                    <span class="text-muted" style="font-size:11px;margin-left:6px">disp: ${avail}</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:5px">
                    <button class="btn btn-secondary btn-sm" data-pcminus="${pc.id}"${qty===0?' disabled':''} style="width:28px;padding:0">−</button>
                    <span class="pc-qty" style="min-width:24px;text-align:center;font-weight:800;font-size:15px;color:${qty>0?'var(--blue)':'var(--gray-400)'}">${qty||'·'}</span>
                    <button class="btn btn-primary btn-sm" data-pcplus="${pc.id}" data-pcname="${prod.name}" data-pccolor="${pc.color}" data-pcavail="${avail}"${avail===0?' disabled':''} style="width:28px;padding:0">+</button>
                  </div>
                </div>`;
              }).join('')}
            </div>`).join('')}
        </div>
        <div id="step3Cart" style="width:160px;flex-shrink:0;border:1.5px solid var(--blue);border-radius:var(--radius);overflow-y:auto;background:var(--blue-light);display:${o.items.length>0?'flex':'none'};flex-direction:column">
          <div style="padding:8px 10px;font-size:11px;font-weight:700;color:var(--blue);border-bottom:1px solid var(--blue);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">🛒 Carrito</div>
          <div class="cart-body" style="padding:6px 8px;overflow-y:auto;flex:1">
            ${o.items.map(i=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(59,130,246,.15);font-size:12px">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.productName}</div>
                  <div style="color:var(--gray-500);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.color}</div>
                </div>
                <span style="font-weight:800;font-size:14px;color:var(--blue);margin-left:6px;flex-shrink:0">${i.quantity}</span>
              </div>`).join('')}
            <div style="padding-top:6px;font-size:12px;font-weight:700;color:var(--blue);text-align:right">${totalRollos} total</div>
          </div>
        </div>
      </div>`;


  } else if (step === 4) {
    // Paso 4: Precios por artículo
    // Agrupar items por producto para mostrar la unidad (kg/metros) una sola vez
    const prodsSeen = {};
    body = `<p class="text-sm text-muted mb-3">Ingresá el precio pactado por unidad para cada artículo.</p>
      <div style="max-height:52vh;overflow-y:auto">` +
      o.items.map((item, idx) => {
        const prod = S.products.find(p => (p.product_colors||[]).some(pc => pc.id === item.productColorId));
        const unit = o.itemUnits?.[prod?.id] || prod?.unit || null;
        const needUnit = !unit;
        const unitBlock = needUnit && !prodsSeen[prod?.id] ? `
          <div style="background:var(--yellow-light);border:1px solid var(--yellow);border-radius:var(--radius);padding:8px 10px;margin-bottom:6px;font-size:12px">
            <strong>¿${prod?.name} se vende por...?</strong>
            <div style="display:flex;gap:6px;margin-top:6px">
              <button class="comp-btn${(o.itemUnits?.[prod?.id])==='kg'?' active':''}" data-set-unit="${prod?.id}" data-unit-val="kg">📦 Kg</button>
              <button class="comp-btn${(o.itemUnits?.[prod?.id])==='metros'?' active':''}" data-set-unit="${prod?.id}" data-unit-val="metros">📏 Metros</button>
            </div>
          </div>` : '';
        if (prod?.id) prodsSeen[prod.id] = true;
        return `
          <div style="padding:10px;border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:8px">
            ${unitBlock}
            <div style="font-size:13px;font-weight:600;margin-bottom:6px">${item.productName} · <span style="color:var(--gray-500)">${item.color}</span>
              <span style="color:var(--gray-400);font-weight:400;margin-left:6px">${item.quantity} rollo${item.quantity>1?'s':''}</span>
              ${unit?`<span style="background:var(--blue-light);color:var(--blue);border-radius:4px;padding:1px 6px;font-size:11px;margin-left:4px">${unit}</span>`:''}
            </div>
            <div class="form-row mb-0">
              <div class="form-group mb-0">
                <label>Precio por ${unit||'unidad'}</label>
                <input type="number" min="0" step="0.01" placeholder="0.00"
                  id="fPrice_${item.productColorId}"
                  value="${item.price||''}"
                  style="font-size:15px">
              </div>
              <div class="form-group mb-0">
                <label>Moneda</label>
                <select id="fPriceCur_${item.productColorId}">
                  <option value="USD"${item.priceCurrency==='USD'?' selected':''}>U$D</option>
                  <option value="ARS"${item.priceCurrency==='ARS'?' selected':''}>$ Pesos</option>
                </select>
              </div>
            </div>
          </div>`;
      }).join('') +
      `</div>
      <div class="alert alert-info mt-2" style="font-size:12px">💡 Los precios quedan pendientes de aprobación del administrador.</div>`;

  } else if (step === 5) {
    body=`<div class="form-group"><label>Dirección de entrega</label>
        <input type="text" id="fDelivAddr" value="${o.deliveryAddress||o.clientAddress}" placeholder="Dirección completa"></div>
      <div class="form-group"><label>¿Cómo se entrega?</label>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button class="comp-btn${o.deliveryType==='retiro'?' active':''}" data-dt="retiro">🏪 Retira el cliente</button>
          <button class="comp-btn${o.deliveryType==='envio'?' active':''}" data-dt="envio">🚚 Le enviamos</button>
        </div></div>
      ${o.deliveryType?`<div class="form-group"><label>${o.deliveryType==='retiro'?'Fecha y hora de retiro':'Fecha y hora de envío'}</label>
        <input type="datetime-local" id="fDelivDT" value="${o.deliveryDatetime||''}" min="${todayStr()}T00:00"></div>`:''}
      <div class="form-group mb-0"><label>¿Va facturado?</label>
        <div style="display:flex;gap:8px">
          <button class="comp-btn${o.invoiced?' active':''}" data-inv="1">✅ Sí</button>
          <button class="comp-btn${!o.invoiced?' active':''}" data-inv="0">❌ No</button>
        </div></div>`;

  } else if (step === 6) {
    body=`
      <div class="order-step-item"><span class="order-step-icon">👤</span>
        <div><strong>Cliente:</strong> ${o.clientName}</div></div>
      <div class="order-step-item"><span class="order-step-icon">💳</span>
        <div><strong>Pago:</strong> ${formatPayment(o)}</div></div>
      <div class="order-step-item"><span class="order-step-icon">🧵</span>
        <div><strong>Productos y precios:</strong><br>
          ${o.items.length>0
            ? o.items.map(i=>{
                const prod = S.products.find(p=>(p.product_colors||[]).some(pc=>pc.id===i.productColorId));
                const unit = o.itemUnits?.[prod?.id]||prod?.unit||'rollo';
                return `${i.productName} ${i.color}: <strong>${i.quantity}</strong> · ${i.price?`<strong>${i.priceCurrency==='ARS'?'$':'U$D'} ${parseFloat(i.price).toFixed(2)}</strong>/${unit}`:'<em class="text-muted">sin precio</em>'}`;
              }).join('<br>')
            : '<em class="text-muted">Sin productos</em>'}
        </div></div>
      <div class="order-step-item"><span class="order-step-icon">🚚</span>
        <div><strong>Entrega:</strong> ${o.deliveryAddress||'—'}<br>
          <span class="text-muted text-sm">${o.deliveryType==='retiro'?'Retira':o.deliveryType==='envio'?'Enviamos':''} ${o.deliveryDatetime?`· ${o.deliveryDatetime}`:''}</span>
        </div></div>
      <div class="order-step-item"><span class="order-step-icon">🧾</span>
        <div><strong>Factura:</strong> ${o.invoiced?'Sí':'No'}</div></div>
      <div class="form-group mt-3 mb-0"><label>Nota para el admin (opcional)</label>
        <textarea id="fOrderNote" rows="2" placeholder="Aclaraciones...">${o.sellerNote||''}</textarea></div>
      ${S.err?`<div class="alert alert-error mt-2">${S.err}</div>`:''}`;
  }

  const allPriced = o.items.every(i => i.price && parseFloat(i.price) > 0);
  const allUnitsSet = step===4 ? o.items.every(i => {
    const prod = S.products.find(p=>(p.product_colors||[]).some(pc=>pc.id===i.productColorId));
    return (o.itemUnits?.[prod?.id])||prod?.unit;
  }) : true;
  const canNext=(step===1&&o.clientId)||(step===2&&o.paymentType)||(step===3&&o.items.length>0)||
                (step===4&&allPriced&&allUnitsSet)||(step===5&&o.deliveryType)||step===6;
  const isEdit=!!S.editOrderId;
  return `<div class="modal-overlay" id="overlay">
    <div class="modal" style="max-width:560px">
      <div class="modal-header">
        <div class="modal-title">${isEdit?'✏️ Modificar pedido':'📋 Nuevo pedido'} — Paso ${step}/6</div>
        <button class="btn btn-secondary btn-sm" data-close>✕</button>
      </div>
      <div class="modal-body">
        <div class="steps">
          ${['Cliente','Pago','Artículos','Precios','Entrega','Revisar'].map((l,i)=>
            `<div class="step ${step>i+1?'done':step===i+1?'active':''}">${l}</div>`).join('')}
        </div>
        ${body}
      </div>
      <div class="modal-footer">
        ${step>1?`<button class="btn btn-secondary" id="btnOrderPrev">← Atrás</button>`:''}
        ${step<6?`<button class="btn btn-primary" id="btnOrderNext" ${canNext?'':'disabled'}>Siguiente →</button>`:''}
        ${step===6?`<button class="btn btn-success" id="btnOrderSubmit" ${S.loading?'disabled':''}>
          ${S.loading?'<div class="spinner"></div>':'📨 '+(isEdit?'Reenviar':'Enviar pedido')}
        </button>`:''}
      </div>
    </div>
  </div>`;
}

function mOrderDetail() {
  const o = S.orderDetail;
  if (!o) return '';
  const hist = S.orderHistory;
  const canAdminAct = isAdmin() && o.pending_actor==='admin' && ['nuevo','en_revision'].includes(o.status);
  const canSellerModify = S.profile?.role==='seller' && o.seller_id===S.profile.id && ['nuevo','en_revision'].includes(o.status);
  const canSellerEdit = canSellerModify;

  const HLBL = { submitted:'Pedido enviado', resubmitted:'Pedido resubmitido',
    approve:'Aprobado', reject:'Rechazado', revision:'Revisión solicitada', delivered:'Entregado' };
  const HCLR = { submitted:'#3b82f6', resubmitted:'#8b5cf6', approve:'#16a34a',
    reject:'#dc2626', revision:'#d97706', delivered:'#6b7280' };

  const histHtml = hist.length===0
    ? '<div class="text-muted text-sm">Sin historial</div>'
    : hist.map(h=>`<div style="display:flex;gap:10px;padding:8px 0;border-left:2px solid var(--gray-200);padding-left:12px;margin-left:8px">
        <div style="width:10px;height:10px;border-radius:50%;background:${HCLR[h.action]||'#999'};flex-shrink:0;margin-top:4px;margin-left:-17px"></div>
        <div>
          <div style="font-size:13px;font-weight:600">${HLBL[h.action]||h.action}</div>
          <div style="font-size:11px;color:var(--gray-500)">${h.profiles?.name||'Sistema'} · ${h.created_at?.slice(0,16).replace('T',' ')}</div>
          ${h.note?`<div style="font-size:13px;margin-top:3px">"${h.note}"</div>`:''}
        </div>
      </div>`).join('');

  const clientCurr = o.clients?.balance_currency || 'USD';
  const symCurr = clientCurr === 'ARS' ? '$' : 'U$D';
  const itemsHtml=(o.order_items||[]).map(i=>{
    const unit = i.product_colors?.products?.unit || '—';
    const priceStr = i.price
      ? `<span style="font-weight:600">${i.price_currency==='ARS'?'$':'U$D'} ${parseFloat(i.price).toFixed(2)}</span>/${unit}${i.price_approved?` <span style="color:var(--green);font-size:10px">✔ aprobado</span>`:' <span style="color:var(--orange);font-size:10px">pendiente</span>'}`
      : '<span style="color:var(--gray-400)">—</span>';
    return `<tr>
      <td>${i.product_colors?.products?.name||'—'}</td>
      <td>${i.product_colors?.color||'—'}</td>
      <td style="text-align:center">${unit}</td>
      <td style="text-align:center">${i.quantity}</td>
      <td>${priceStr}</td>
    </tr>`;
  }).join('');
  // IVA calculation (approximate: qty rollos × precio/unidad)
  const orderSubtotal = (o.order_items||[]).reduce((s,i) => {
    if (!i.price) return s;
    return s + parseFloat(i.quantity||0) * parseFloat(i.price||0);
  }, 0);
  const ivaAmount = o.invoiced ? orderSubtotal * 0.21 : 0;
  const orderTotal = orderSubtotal + ivaAmount;
  const ivaHtml = o.invoiced && orderSubtotal > 0 ? `
    <tr style="border-top:1px solid var(--gray-200)">
      <td colspan="4" style="text-align:right;color:var(--gray-500);padding:4px 8px;font-size:12px">Subtotal neto:</td>
      <td style="text-align:right;padding:4px 8px;font-size:12px">${symCurr} ${orderSubtotal.toFixed(2)}</td>
    </tr>
    <tr>
      <td colspan="4" style="text-align:right;color:var(--orange);padding:4px 8px;font-size:12px">IVA 21%:</td>
      <td style="text-align:right;padding:4px 8px;font-size:12px;color:var(--orange)">${symCurr} ${ivaAmount.toFixed(2)}</td>
    </tr>
    <tr style="border-top:2px solid var(--gray-200)">
      <td colspan="4" style="text-align:right;font-weight:700;padding:6px 8px">Total con IVA:</td>
      <td style="text-align:right;padding:6px 8px;font-weight:700;color:var(--blue)">${symCurr} ${orderTotal.toFixed(2)}</td>
    </tr>` : '';

  return `<div class="modal-overlay" id="overlay">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <div>
          <div class="modal-title">${o.order_number||'...'}</div>
          <div style="margin-top:4px">${statusBadge(o.status)}</div>
        </div>
        <button class="btn btn-secondary btn-sm" data-close>✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row mb-3">
          <div><span class="text-muted text-sm">Cliente</span><br><strong>${o.clients?.name||S.clients.find(c=>c.id===o.client_id)?.name||'—'}</strong></div>
          ${isAdmin()?`<div><span class="text-muted text-sm">Vendedor</span><br><strong>${o.profiles?.name||'—'}</strong></div>`:''}
        </div>
        <div class="divider"></div>
        <div class="mb-3">
          <div class="text-muted text-sm mb-2">Productos y precios</div>
          <table style="width:100%;font-size:13px">
            <thead><tr><th>Artículo</th><th>Color</th><th>Unidad</th><th style="text-align:center">Cant.</th><th>Precio</th></tr></thead>
            <tbody>${itemsHtml||`<tr><td colspan="5" class="text-muted">—</td></tr>`}</tbody>
            ${ivaHtml}
          </table>
        </div>
        <div class="divider"></div>
        <div class="form-row mb-3">
          <div><span class="text-muted text-sm">Forma de pago</span><br><span style="font-size:13px">${formatPaymentFromOrder(o)}</span></div>
          <div><span class="text-muted text-sm">Factura</span><br><span style="font-size:13px">${o.invoiced?'Sí':'No'}</span></div>
        </div>
        <div class="mb-3">
          <span class="text-muted text-sm">Entrega</span><br>
          <span style="font-size:13px">${o.delivery_address||'—'}</span>
          ${o.delivery_type?`<br><span style="font-size:12px;color:var(--gray-500)">${o.delivery_type==='retiro'?'Retira el cliente':'Le enviamos'} ${o.delivery_datetime?`· ${o.delivery_datetime}`:''}</span>`:''}
        </div>
        ${o.seller_note?`<div class="mb-3"><span class="text-muted text-sm">Nota del vendedor</span><br><span style="font-size:13px">${o.seller_note}</span></div>`:''}
        <div class="divider"></div>
        <div class="mb-2"><strong style="font-size:13px">Historial</strong></div>
        ${histHtml}
        ${canAdminAct?`
        <div class="divider"></div>
        <div class="mb-2"><strong style="font-size:13px">Acción</strong></div>
        <div class="form-group"><label>Nota (requerida para revisión/rechazo)</label>
          <textarea id="fAdminNote" rows="2" placeholder="Motivo o instrucciones..."></textarea></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-success btn-sm" id="btnOrderApprove">✅ Aprobar</button>
          <button class="btn btn-secondary btn-sm" style="border-color:var(--orange);color:var(--orange)" id="btnOrderRevision">🔄 Pedir revisión</button>
          <button class="btn btn-danger btn-sm" id="btnOrderReject">❌ Rechazar</button>
        </div>`:''}
        ${canSellerEdit?`
        <div class="divider"></div>
        ${o.pending_actor==='seller'?'<div class="alert alert-info mb-3">El admin solicitó cambios. Modificá el pedido y reenvialo.</div>':''}
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" id="btnEditOrder" data-edit-order="${o.id}">✏️ Modificar</button>
          <button class="btn btn-danger btn-sm" id="btnDeleteOrder" data-del-order="${o.id}">🗑️ Eliminar</button>
        </div>`:''}
        ${['aprobado','entregando'].includes(o.status) && (S.profile?.role==='seller' ? o.seller_id===S.profile.id : isAdmin())?`
        <div class="divider"></div>
        <button class="btn btn-success btn-sm" id="btnDeliverFromOrder">🚚 Registrar entrega</button>`:''}
        ${S.err?`<div class="alert alert-error mt-3">${S.err}</div>`:''}
      </div>
