function vRemitos() {
  const sellers = isOwner() ? S.sellers : S.sellers.filter(s=>s.company_id===S.profile?.company_id);
  const sellerOpts = sellers.map(s=>`<option value="${s.id}"${S.filterRemitoSeller===s.id?' selected':''}>${s.name}</option>`).join('');
  const clientOpts = S.clients.map(c=>`<option value="${c.id}"${S.filterRemitoClient===c.id?' selected':''}>${c.name}</option>`).join('');

  const approvedOrders = S.orders.filter(o=>['aprobado','armando_remito'].includes(o.status));
  const filtered = approvedOrders.filter(o=>{
    if (S.filterRemitoSeller && S.filterRemitoSeller!=='all' && o.seller_id!==S.filterRemitoSeller) return false;
    if (S.filterRemitoClient && S.filterRemitoClient!=='all' && o.client_id!==S.filterRemitoClient) return false;
    if (S.filterRemitoSearch) {
      const q=S.filterRemitoSearch.toLowerCase();
      const cn=(o.clients?.name||S.clients.find(c=>c.id===o.client_id)?.name||'').toLowerCase();
      if (!o.order_number?.toLowerCase().includes(q) && !cn.includes(q)) return false;
    }
    return true;
  });

  const pendRows = filtered.length===0
    ? `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📝</div>Sin pedidos para remitar</div></td></tr>`
    : filtered.map(o=>{
        const cn = o.clients?.name||S.clients.find(c=>c.id===o.client_id)?.name||'—';
        const hasRemito = S.remitos.some(r=>r.order_id===o.id && r.status==='borrador');
        return `<tr style="cursor:pointer" data-new-remito="${o.id}">
          <td><strong>${o.order_number||'—'}</strong></td>
          <td>${cn}</td>
          <td>${o.profiles?.name||'—'}</td>
          <td>${statusBadge(o.status)}</td>
          <td>${hasRemito?'<span style="color:var(--orange);font-size:12px">📝 En borrador</span>':'<span style="color:var(--gray-400);font-size:12px">Sin remito</span>'}</td>
        </tr>`;
      }).join('');

  const borradores = S.remitos.filter(r=>r.status==='borrador');
  const entregados = S.remitos.filter(r=>r.status==='entregado').slice(0,20);

  const borRows = borradores.length===0
    ? `<tr><td colspan="4"><div class="empty-state" style="padding:12px"><div class="empty-icon">📋</div>Sin borradores</div></td></tr>`
    : borradores.map(r=>`<tr style="cursor:pointer" data-remito-detail="${r.id}">
        <td><strong>${r.remito_number||'—'}</strong></td>
        <td>${r.clients?.name||'—'}</td>
        <td>${r.orders?.order_number||'—'}</td>
        <td><span class="badge st-revision">Borrador</span></td>
      </tr>`).join('');

  const entRows = entregados.length===0
    ? `<tr><td colspan="4"><div class="empty-state" style="padding:12px"><div class="empty-icon">📦</div>Sin remitos entregados</div></td></tr>`
    : entregados.map(r=>`<tr style="cursor:pointer" data-remito-detail="${r.id}">
        <td><strong>${r.remito_number||'—'}</strong></td>
        <td>${r.clients?.name||'—'}</td>
        <td>${r.orders?.order_number||'—'}</td>
        <td><span class="badge st-entregado">Entregado</span></td>
      </tr>`).join('');

  return `
  <div class="card mb-3">
    <div class="filter-bar">
      <input type="text" placeholder="🔍 N° pedido o cliente..." id="fRemitoSearch" value="${S.filterRemitoSearch||''}" style="max-width:200px">
      <select id="fRemitoSeller" style="width:auto !important"><option value="all">Todos los vendedores</option>${sellerOpts}</select>
      <select id="fRemitoClient" style="width:auto !important"><option value="all">Todos los clientes</option>${clientOpts}</select>
      <button class="btn btn-secondary btn-sm" id="btnReloadRemitos">🔄</button>
    </div>
  </div>
  <div class="card mb-3">
    <div class="card-header"><div class="card-title">📋 Pedidos aprobados — hacer remito</div></div>
    <div class="table-wrap"><table>
      <thead><tr><th>N° Pedido</th><th>Cliente</th><th>Vendedor</th><th>Estado</th><th>Remito</th></tr></thead>
      <tbody>${pendRows}</tbody>
    </table></div>
  </div>
  <div class="card mb-3">
    <div class="card-header"><div class="card-title">📝 Borradores (${borradores.length})</div></div>
    <div class="table-wrap"><table>
      <thead><tr><th>N° Remito</th><th>Cliente</th><th>N° Pedido</th><th>Estado</th></tr></thead>
      <tbody>${borRows}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">📦 Remitos entregados</div></div>
    <div class="table-wrap"><table>
      <thead><tr><th>N° Remito</th><th>Cliente</th><th>N° Pedido</th><th>Estado</th></tr></thead>
      <tbody>${entRows}</tbody>
    </table></div>
  </div>`;
}

function mCuentaCorriente() {
  if (S.modal !== 'cuentaCorriente') return '';
  const clientId = S.cuentaClienteId;
  if (!clientId) return '';
  const client = S.clients.find(c => c.id === clientId);
  if (!client) return '';
  const { collections = [], remitos = [] } = S.clientMovements || {};
  const cur = client.balance_currency || 'USD';
  const sym = cur === 'ARS' ? '$' : 'U$D';

  // Date filter
  const desde = S.cuentaFechaDesde || '';
  const hasta = S.cuentaFechaHasta || '';

  // Build unified movements array
  const movements = [];
  collections.forEach(c => {
    movements.push({
      date: c.date,
      concepto: `Pago — ${fmtColPayType(c.payment_type)}${c.notes ? ' · ' + c.notes : ''}`,
      debit: 0,
      credit: parseFloat(c.amount_account) || 0,
    });
  });
  remitos.forEach(r => {
    let total = 0;
    const tc = parseFloat(r.tc) || 1;
    (r.remito_items || []).forEach(ri => {
      const price = parseFloat(ri.order_items?.price) || 0;
      const qty   = parseFloat(ri.quantity) || 0;
      let amount  = qty * price;
      const priceCur = ri.order_items?.price_currency || cur;
      if (priceCur !== cur && tc > 0) {
        amount = priceCur === 'ARS' ? amount / tc : amount * tc;
      }
      total += amount;
    });
    movements.push({
      date: r.delivered_at ? r.delivered_at.split('T')[0] : '',
      concepto: `Entrega — Remito ${r.remito_number}`,
      debit: total,
      credit: 0,
    });
  });
  movements.sort((a, b) => (a.date||'').localeCompare(b.date||''));

  // Apply date filter
  const movFiltered = movements.filter(m => {
    if (desde && m.date < desde) return false;
    if (hasta && m.date > hasta) return false;
    return true;
  });

  // Compute opening balance from current balance + ALL movements
  const currentBalance  = parseFloat(client.balance) || 0;
  const totalDebitsAll  = movements.reduce((s, m) => s + m.debit, 0);
  const totalCreditsAll = movements.reduce((s, m) => s + m.credit, 0);
  const openingBalance  = currentBalance - totalCreditsAll + totalDebitsAll;

  // Filtered totals for display
  const totalDebits  = movFiltered.reduce((s, m) => s + m.debit, 0);
  const totalCredits = movFiltered.reduce((s, m) => s + m.credit, 0);

  // Running balance starts at the balance up to the 'desde' date
  let running = openingBalance;
  movements.filter(m => desde && m.date < desde).forEach(m => { running += m.credit - m.debit; });

  const rowsHtml = movFiltered.length === 0
    ? `<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:24px">Sin movimientos para el período seleccionado</td></tr>`
    : movFiltered.map(m => {
        running += m.credit - m.debit;
        const balColor = running < 0 ? '#dc2626' : running > 0 ? '#16a34a' : 'var(--gray-500)';
        const sign     = running < 0 ? '-' : running > 0 ? '+' : '';
        return `<tr style="border-bottom:1px solid var(--gray-100)">
          <td style="padding:8px 10px;white-space:nowrap">${fmt(m.date)}</td>
          <td style="padding:8px 10px">${m.concepto}</td>
          <td style="padding:8px 10px;text-align:right;color:#dc2626">${m.debit>0 ? fmtMoney(m.debit,cur) : '—'}</td>
          <td style="padding:8px 10px;text-align:right;color:#16a34a">${m.credit>0 ? fmtMoney(m.credit,cur) : '—'}</td>
          <td style="padding:8px 10px;text-align:right;font-weight:700;color:${balColor}">${sign}${fmtMoney(running,cur)}</td>
        </tr>`;
      }).join('');

  const printBody = `
    <style>
      body{font-family:Arial,sans-serif;font-size:12px;color:#111;margin:20px}
      h2{margin:0 0 4px}p{margin:0 0 16px;color:#555}
      table{width:100%;border-collapse:collapse}
      th{background:#f3f4f6;text-align:left;padding:6px 8px;border-bottom:2px solid #d1d5db;font-size:11px;text-transform:uppercase}
      td{padding:6px 8px;border-bottom:1px solid #e5e7eb}
      .deb{color:#dc2626}.cre{color:#16a34a}.neg{color:#dc2626}.pos{color:#16a34a}

// ── CALENDAR TAB ─────────────────────────────────────────────────────────────
function vLocalCalendario() {
  const y = S.localCalYear ?? new Date().getFullYear();
  const m = S.localCalMonth ?? new Date().getMonth();
  const today = new Date();
  const first = new Date(y, m, 1).getDay();
  const days  = new Date(y, m+1, 0).getDate();
  const prevD = new Date(y, m, 0).getDate();

  // Build date → orders map for pendiente/borrador
  const TYPE_COLOR = { venta:'#22c55e', reserva:'#3b82f6', devolucion:'#f97316' };
  const byDate = {};
  (S.localOrders||[]).forEach(o => {
    const d = (o.order_date || o.created_at || '').slice(0,10);
    if (!d) return;
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(o);
  });

  const DAYS_LOCAL = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cells = DAYS_LOCAL.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  for (let i = 0; i < first; i++) {
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${prevD-first+i+1}</div></div>`;
  }
  for (let d = 1; d <= days; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const acts = byDate[ds] || [];
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    const dots = acts.map(o => {
      const col = TYPE_COLOR[o.move_type] || '#9ca3af';
      return `<span title="${o.move_type||''}" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin:1px"></span>`;
    }).join('');
    const cnt = acts.length > 0 ? `<div style="font-size:9px;color:var(--gray-400);text-align:center">${acts.length}</div>` : '';
    cells += `<div class="cal-day${isToday?' today':''}" style="cursor:pointer" data-local-day="${ds}"><div class="cal-day-num">${d}</div><div class="cal-dots">${dots}</div>${cnt}</div>`;
  }
  const total = Math.ceil((first+days)/7)*7;
  for (let i = first+days+1; i <= total; i++) cells += `<div class="cal-day other-month"><div class="cal-day-num">${i-first-days}</div></div>`;

  const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `
  <div class="card mb-0">
    <div class="card-body">
      <div class="cal-header">
        <button class="btn btn-secondary btn-sm" data-local-cal-prev>◀</button>
        <div class="cal-month">${MONTHS_ES[m]} ${y}</div>
        <button class="btn btn-secondary btn-sm" data-local-cal-next>▶</button>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="text-muted mt-3" style="font-size:12px">Tocá un día para ver pedidos o crear uno nuevo</div>
    </div>
  </div>`;
}

function calcOrderTotal(o) {
  return (o.local_order_items||[]).reduce((s,i)=>{
    const kg=(i.local_order_rolls||[]).reduce((ss,r)=>ss+parseFloat(r.quantity||0),0);
    return s+kg*parseFloat(i.price||0);
  },0);
}
function sortLocalList(list, sort) {
  return [...list].sort((a,b)=>{
    let va, vb;
    if      (sort.col==='fecha')   { va=a.order_date||a.created_at||''; vb=b.order_date||b.created_at||''; }
    else if (sort.col==='cliente') { va=(a.clients?.name||'').toLowerCase(); vb=(b.clients?.name||'').toLowerCase(); }
    else if (sort.col==='monto')   { va=calcOrderTotal(a); vb=calcOrderTotal(b); }
    else if (sort.col==='numero')  { va=a.order_number||''; vb=b.order_number||''; }
    else { va=''; vb=''; }
    if (va<vb) return sort.dir==='asc'?-1:1;
    if (va>vb) return sort.dir==='asc'?1:-1;
    return 0;
  });
}
function applyLocalFilters(list, f) {
  if (!f) return list;
  return list.filter(o=>{
    const total = calcOrderTotal(o);
    const fecha = (o.order_date||o.created_at||'').slice(0,10);
    if (f.cliente && !(o.clients?.name||'').toLowerCase().includes(f.cliente.toLowerCase())) return false;
    if (f.tipo?.length>0 && !f.tipo.includes(o.move_type)) return false;
    if (f.fechaDesde && fecha<f.fechaDesde) return false;
    if (f.fechaHasta && fecha>f.fechaHasta) return false;
    if (f.montoMin && total<parseFloat(f.montoMin)) return false;
    if (f.montoMax && total>parseFloat(f.montoMax)) return false;
    return true;
  });
}
function countActiveFilters(f) {
  if (!f) return 0;
  let n=0;
  if (f.cliente) n++;
  if (f.tipo?.length>0) n++;
  if (f.fechaDesde||f.fechaHasta) n++;
  if (f.montoMin||f.montoMax) n++;
  return n;
}
function downloadCSV(filename, lines) {
  const bom='﻿';
  const esc=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const csv=bom+lines.map(r=>r.map(esc).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=filename; a.click();
}
function buildOrderDetailRows(o) {
  return (o.local_order_items||[]).map(item=>{
    const prod=(S.products||[]).find(p=>(p.product_colors||[]).some(c=>c.id===item.product_color_id));
    const pc=(prod?.product_colors||[]).find(c=>c.id===item.product_color_id);
    const rolls=(item.local_order_rolls||[]).slice().sort((a,b)=>a.roll_number-b.roll_number);
    const totalKg=rolls.reduce((s,r)=>s+parseFloat(r.quantity||0),0);
    const totalRolls=rolls.filter(r=>parseFloat(r.quantity||0)>0).length;
    const price=parseFloat(item.price||0);
    const rkgs=Array.from({length:10},(_,i)=>{const r=rolls.find(x=>x.roll_number===i+1);const kg=r?parseFloat(r.quantity||0):0;return kg>0?kg.toFixed(1):'';});
    return {art:prod?.name||'', color:pc?.color||'', rkgs, totalRolls, totalKg, price, subtotal:totalKg*price};
  });
}
function exportListCSV(filtered, withDetail, filename) {
  const lines=[];
  if (withDetail) {
    filtered.forEach(o=>{
      lines.push(['=== PEDIDO','CLIENTE','TIPO','ESTADO','FECHA','TOTAL']);
      lines.push([o.order_number||'', o.clients?.name||'', o.move_type||'', o.status||'', (o.order_date||o.created_at||'').slice(0,10), calcOrderTotal(o).toFixed(2)]);
      lines.push(['ARTICULO','COLOR','R1','R2','R3','R4','R5','R6','R7','R8','R9','R10','CANT','KILOS','PRECIO','SUBTOTAL']);
      buildOrderDetailRows(o).forEach(r=>{
        lines.push([r.art,r.color,...r.rkgs,r.totalRolls,r.totalKg.toFixed(2),r.price.toFixed(2),r.subtotal.toFixed(2)]);
      });
      lines.push([]);
    });
  } else {
    lines.push(['N\xb0','CLIENTE','TIPO','ESTADO','TOTAL','FECHA']);
    filtered.forEach(o=>{
      lines.push([o.order_number||'', o.clients?.name||'', o.move_type||'', o.status||'', calcOrderTotal(o).toFixed(2), (o.order_date||o.created_at||'').slice(0,10)]);
    });
  }
  downloadCSV(filename, lines);
}

  const showS   = !!S.activosShowSort;
  const withDet = !!S.activosExportDetalle;
  const sq      = (S.localActivosSearch||'').toLowerCase().trim();

  const activos = (S.localOrders||[]).filter(o=>o.status==='borrador'||o.status==='pendiente');
  let filtered  = sq ? activos.filter(o=>(o.order_number||'').toLowerCase().includes(sq)||(o.clients?.name||'').toLowerCase().includes(sq)) : activos;
  filtered = applyLocalFilters(filtered, filters);
  filtered = sortLocalList(filtered, sort);

  const fc = countActiveFilters(filters);
  const badge = fc>0 ? '<span style="background:#3b82f6;color:white;border-radius:99px;padding:0 5px;font-size:10px;margin-left:3px">'+fc+'</span>' : '';

  const tipos=['venta','reserva','devolucion'];
  const tipoL={venta:'Venta',reserva:'Reserva',devolucion:'Dev.'};
  const activeTipos=filters.tipo||[];
  const tipoBtns=tipos.map(t=>'<button class="btn btn-sm '+(activeTipos.includes(t)?'btn-primary':'btn-secondary')+'" data-af-tipo="'+t+'">'+tipoL[t]+'</button>').join('');

  const filterPanel = showF ? `<div style="background:var(--gray-50);border-top:1px solid var(--gray-200);padding:12px 16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Cliente</div><input type="text" id="fAFCliente" value="${filters.cliente||''}" placeholder="Nombre..." style="width:140px"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Tipo</div><div style="display:flex;gap:4px">${tipoBtns}</div></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Fecha desde</div><input type="date" id="fAFDesde" value="${filters.fechaDesde||''}"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Fecha hasta</div><input type="date" id="fAFHasta" value="${filters.fechaHasta||''}"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Monto mín.</div><input type="number" id="fAFMontoMin" value="${filters.montoMin||''}" placeholder="0" style="width:90px"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Monto máx.</div><input type="number" id="fAFMontoMax" value="${filters.montoMax||''}" placeholder="∞" style="width:90px"></div>
    <button class="btn btn-sm btn-secondary" id="btnAFClear">🗑️ Limpiar</button>
  </div>` : '';

  const sortCols=[{id:'fecha',lb:'Fecha'},{id:'cliente',lb:'Cliente'},{id:'monto',lb:'Monto'},{id:'numero',lb:'N°'}];
  const sortPanel = showS ? `<div style="background:var(--gray-50);border-top:1px solid var(--gray-200);padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;color:var(--gray-600)">Ordenar por:</span>
    <div style="display:flex;gap:4px">${sortCols.map(c=>'<button class="btn btn-sm '+(sort.col===c.id?'btn-primary':'btn-secondary')+'" data-as-col="'+c.id+'">'+c.lb+'</button>').join('')}</div>
    <div style="display:flex;gap:4px">
      <button class="btn btn-sm ${sort.dir==='asc'?'btn-primary':'btn-secondary'}" data-as-dir="asc">▲ Asc</button>
      <button class="btn btn-sm ${sort.dir==='desc'?'btn-primary':'btn-secondary'}" data-as-dir="desc">▼ Desc</button>
    </div>
  </div>` : '';

  const rows = filtered.length===0
    ? `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📋</div>${sq||fc>0?'Sin resultados para los filtros aplicados':'No hay pedidos activos'}</div></td></tr>`
    : filtered.map(o=>{
        const total=calcOrderTotal(o);
        const stColor=o.status==='borrador'?'var(--gray-400)':'var(--blue)';
        const stLabel=o.status==='borrador'?'Borrador':'Pendiente';
        return `<tr style="cursor:pointer" data-local-order="${o.id}">
          <td style="font-size:12px;white-space:nowrap">${(o.order_date||o.created_at||'').slice(0,10)}</td>
          <td><strong>${o.order_number||'—'}</strong></td>
          <td>${o.clients?.name||'<span style="color:var(--gray-400)">Sin cliente</span>'}</td>
          <td>${pill(o.move_type)}</td>
          <td><span style="background:${stColor};color:white;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">${stLabel}</span></td>
          <td style="text-align:right">${total>0?`$ ${total.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—'}</td>
          <td><button class="btn btn-sm btn-secondary" data-local-detail="${o.id}" onclick="event.stopPropagation()" style="padding:2px 10px;font-size:11px">🔍</button></td>
        </tr>`;
      }).join('');

  return `
  <div class="card" style="padding:0">
    <div class="card-header" style="flex-wrap:wrap;gap:8px;padding:12px 16px">
      <input type="text" id="fLocalActivosSearch" placeholder="🔍 Buscar N° o cliente..." value="${S.localActivosSearch||''}" style="max-width:210px">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-sm ${showF?'btn-primary':'btn-secondary'}" id="btnAFToggle">⚙️ Filtrar${badge}</button>
        <button class="btn btn-sm ${showS?'btn-primary':'btn-secondary'}" id="btnASToggle">⇕ Ordenar</button>
        <label style="font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer;white-space:nowrap;padding:0 4px">
          <input type="checkbox" id="cbAExportDet" ${withDet?'checked':''}> Con detalle
        </label>
        <button class="btn btn-sm btn-secondary" id="btnExportActivosCSV">📊 Excel</button>
        <button class="btn btn-sm btn-secondary" id="btnExportActivosPDF">🖨️ PDF</button>
        ${!S.adminViewLocalId?'<button class="btn btn-primary" id="btnNewLocalOrder">+ Nuevo pedido</button>':''}
      </div>
    </div>
    ${filterPanel}${sortPanel}
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="cursor:pointer;white-space:nowrap" onclick="S.localActivosSort={col:'fecha',dir:(S.localActivosSort?.col==='fecha'&&S.localActivosSort?.dir==='desc'?'asc':'desc')};draw()">${sort.col==='fecha'?(sort.dir==='asc'?'Fecha ↑':'Fecha ↓'):'Fecha'}</th>
          <th>N°</th>
          <th style="cursor:pointer" onclick="S.localActivosSort={col:'cliente',dir:(S.localActivosSort?.col==='cliente'&&S.localActivosSort?.dir==='desc'?'asc':'desc')};draw()">${sort.col==='cliente'?(sort.dir==='asc'?'Cliente ↑':'Cliente ↓'):'Cliente'}</th>
          <th>Tipo</th>
          <th>Estado</th>
          <th style="cursor:pointer;text-align:right" onclick="S.localActivosSort={col:'monto',dir:(S.localActivosSort?.col==='monto'&&S.localActivosSort?.dir==='desc'?'asc':'desc')};draw()">${sort.col==='monto'?(sort.dir==='asc'?'Total ↑':'Total ↓'):'Total'}</th>
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}


// ── LOCAL ORDER DETAIL MODAL ─────────────────────────────────────────────────
function mLocalOrderDetail() {
  if (S.modal !== 'localOrderDetail') return '';
  const o = S.localOrderDraft;
  if (!o) return '';
  const items = o.local_order_items || [];
  let grandTotal = 0, grandKg = 0, grandRolls = 0;
  const itemRows = items.map(item => {
    const prod = (S.products||[]).find(p=>(p.product_colors||[]).some(c=>c.id===item.product_color_id));
    const pc   = (prod?.product_colors||[]).find(c=>c.id===item.product_color_id);
    const articleName = prod?.name || '—';
    const colorName   = pc?.color  || '—';
    const rolls = (item.local_order_rolls||[]).slice().sort((a,b)=>a.roll_number-b.roll_number);
    const totalKg     = rolls.reduce((s,r)=>s+parseFloat(r.quantity||0),0);
    const totalRolls  = rolls.filter(r=>parseFloat(r.quantity||0)>0).length;
    const price       = parseFloat(item.price||0);
    const subtotal    = totalKg * price;
    grandTotal += subtotal; grandKg += totalKg; grandRolls += totalRolls;
    const rollCells = Array.from({length:10},(_,i)=>{
      const r  = rolls.find(x=>x.roll_number===i+1);
      const kg = r ? parseFloat(r.quantity||0) : 0;
      return `<td style="text-align:right;font-size:12px;padding:5px 6px;border-bottom:1px solid var(--gray-200)">${kg>0?kg.toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1}):''}</td>`;
    }).join('');
    return `<tr style="background:white">
      <td style="padding:5px 8px;border-bottom:1px solid var(--gray-200);font-weight:600">${articleName}</td>
      <td style="padding:5px 8px;border-bottom:1px solid var(--gray-200)">${colorName}</td>
      ${rollCells}
      <td style="padding:5px 8px;border-bottom:1px solid var(--gray-200);text-align:right;font-weight:600">${totalRolls}</td>
      <td style="padding:5px 8px;border-bottom:1px solid var(--gray-200);text-align:right;font-weight:600">${totalKg.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      <td style="padding:5px 8px;border-bottom:1px solid var(--gray-200);text-align:right">${price>0?`$\u202f${price.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—'}</td>
      <td style="padding:5px 8px;border-bottom:1px solid var(--gray-200);text-align:right;font-weight:600">${subtotal>0?`$\u202f${subtotal.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—'}</td>
    </tr>`;
  }).join('');
  return `<div class="modal-overlay" id="mLocalOrderDetail">
    <div class="modal" style="max-width:96vw;width:1050px">
      <div class="modal-header">
        <div>
          <h3 style="margin:0">${o.order_number||'Pedido'} — Detalle</h3>
          <div style="color:var(--gray-400);font-size:13px;margin-top:2px">${o.clients?.name||''}&nbsp;·&nbsp;${pill(o.move_type)}&nbsp;·&nbsp;${(o.order_date||o.created_at||'').slice(0,10)}</div>
        </div>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body" style="overflow-x:auto;padding:0">
        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:860px">
          <thead>
            <tr style="background:var(--blue);color:white">
              <th style="padding:7px 8px;text-align:left;white-space:nowrap">ARTÍCULO</th>
              <th style="padding:7px 8px;text-align:left">Color</th>
              <th style="padding:7px 6px;text-align:right">1</th>
              <th style="padding:7px 6px;text-align:right">2</th>
              <th style="padding:7px 6px;text-align:right">3</th>
              <th style="padding:7px 6px;text-align:right">4</th>
              <th style="padding:7px 6px;text-align:right">5</th>
              <th style="padding:7px 6px;text-align:right">6</th>
              <th style="padding:7px 6px;text-align:right">7</th>
              <th style="padding:7px 6px;text-align:right">8</th>
              <th style="padding:7px 6px;text-align:right">9</th>
              <th style="padding:7px 6px;text-align:right">10</th>
              <th style="padding:7px 8px;text-align:right;white-space:nowrap">Cantidad</th>
              <th style="padding:7px 8px;text-align:right">Kilos</th>
              <th style="padding:7px 8px;text-align:right">Precio</th>
              <th style="padding:7px 8px;text-align:right">Subtotal</th>
            </tr>
          </thead>
          <tbody>${itemRows}</tbody>
          <tfoot>
            <tr style="background:var(--gray-100);font-weight:700;border-top:2px solid var(--blue)">
              <td colspan="12" style="padding:7px 8px;text-align:right">TOTAL</td>
              <td style="padding:7px 8px;text-align:right">${grandRolls}</td>
              <td style="padding:7px 8px;text-align:right">${grandKg.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
              <td style="padding:7px 8px"></td>
              <td style="padding:7px 8px;text-align:right">$\u202f${grandTotal.toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div class="modal-footer" style="display:flex;gap:8px;justify-content:space-between;align-items:center">
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-secondary" id="btnDetailExportCSV">📊 Excel</button>
          <button class="btn btn-sm btn-secondary" id="btnDetailExportPDF">🖨️ PDF</button>
        </div>
        <button class="btn btn-secondary" data-close>Cerrar</button>
      </div>
    </div>
  </div>`;
}

// ── MEETINGS MODAL ───────────────────────────────────────────────────────────
function mMeetings() {
  if (S.modal !== 'meetings') return '';
  const all   = S.meetingRequests || [];
  const sub   = S.meetingsSubTab || 'recibidas';
  const form  = S.meetingForm;
  const cf    = S.meetingCounterForm;

  // ── RECIBIDAS ────────────────────────────────────────────────────────────
  const received = all.filter(r => r.to_user_id === S.profile.id && (r.status==='pending'||r.status==='accepted'||r.status==='rejected'));
  const recRows = received.length===0
    ? `<div class="empty-state" style="padding:24px"><div class="empty-icon">📭</div>Sin reuniones recibidas</div>`
    : received.map(r=>{
        const statusColor = r.status==='accepted'?'#22c55e':r.status==='rejected'?'#ef4444':'#f59e0b';
        const statusLbl   = r.status==='accepted'?'Confirmada':r.status==='rejected'?'Rechazada':'Pendiente';
        const actions = r.status==='pending' ? `
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-sm btn-primary"   data-meet-accept="${r.id}">✅ Aceptar</button>
            <button class="btn btn-sm btn-secondary" data-meet-reject="${r.id}">❌ Rechazar</button>
            <button class="btn btn-sm btn-secondary" data-meet-counter="${r.id}">📅 Proponer otra fecha</button>
          </div>
          ${cf && cf.id===r.id ? `<div style="margin-top:8px;background:var(--gray-50);padding:10px;border-radius:8px">
            <div style="font-size:12px;font-weight:600;margin-bottom:6px">Nueva propuesta:</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <input type="date" id="fCounterDate" value="${cf.date||''}" style="width:150px">
              <input type="time" id="fCounterTime" value="${cf.time||''}" style="width:120px">
              <input type="text" id="fCounterNote" placeholder="Nota (opcional)" value="${cf.note||''}" style="flex:1;min-width:140px">
              <button class="btn btn-sm btn-primary" data-meet-send-counter="${r.id}">Enviar</button>
            </div>
          </div>` : ''}` : '';
        return `<div style="border:1px solid var(--gray-200);border-radius:8px;padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <strong>${r.from_profile?.name||'?'}</strong>
              <span style="margin-left:8px;font-size:12px;color:var(--gray-500)">solicita reunión</span>
            </div>
            <span style="background:${statusColor};color:white;border-radius:99px;padding:2px 8px;font-size:11px">${statusLbl}</span>
          </div>
          <div style="margin-top:4px;font-size:13px">📅 ${r.proposed_date}${r.proposed_time?' · ⏰ '+r.proposed_time:''}</div>
          ${r.note?`<div style="font-size:12px;color:var(--gray-600);margin-top:2px">📝 ${r.note}</div>`:''}
          ${actions}
        </div>`;
      }).join('');

  // ── ENVIADAS ──────────────────────────────────────────────────────────────
  const sent = all.filter(r => r.from_user_id === S.profile.id);
  const sentRows = sent.length===0
    ? `<div class="empty-state" style="padding:24px"><div class="empty-icon">📤</div>Sin solicitudes enviadas</div>`
    : sent.map(r=>{
        const statusColor = r.status==='accepted'?'#22c55e':r.status==='rejected'?'#ef4444':r.status==='counter'?'#3b82f6':'#f59e0b';
        const statusLbl   = {pending:'Pendiente',accepted:'Confirmada',rejected:'Rechazada',counter:'Contrapropuesta'}[r.status]||r.status;
        const counterSection = r.status==='counter' ? `
          <div style="margin-top:6px;background:#eff6ff;padding:8px;border-radius:6px;font-size:12px">
            <strong>Propuesta:</strong> ${r.counter_date}${r.counter_time?' · '+r.counter_time:''}
            ${r.counter_note?`<br>📝 ${r.counter_note}`:''}
            <div style="display:flex;gap:6px;margin-top:6px">
              <button class="btn btn-sm btn-primary"   data-meet-accept-counter="${r.id}">✅ Aceptar</button>
              <button class="btn btn-sm btn-secondary" data-meet-reject="${r.id}">❌ Rechazar</button>
            </div>
          </div>` : '';
        return `<div style="border:1px solid var(--gray-200);border-radius:8px;padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              Para: <strong>${r.to_profile?.name||'?'}</strong>
            </div>
            <span style="background:${statusColor};color:white;border-radius:99px;padding:2px 8px;font-size:11px">${statusLbl}</span>
          </div>
          <div style="margin-top:4px;font-size:13px">📅 ${r.proposed_date}${r.proposed_time?' · ⏰ '+r.proposed_time:''}</div>
          ${r.note?`<div style="font-size:12px;color:var(--gray-600);margin-top:2px">📝 ${r.note}</div>`:''}
          ${counterSection}
        </div>`;
      }).join('');

  // ── NUEVA SOLICITUD ───────────────────────────────────────────────────────
  const profiles = meetingTargets(S.allProfiles || []);
  const newForm = form ? `
    <div style="border:1px solid var(--blue);border-radius:8px;padding:16px;margin-top:4px">
      <div style="font-weight:600;margin-bottom:10px">📅 Nueva solicitud de reunión</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Para</div>
          <select id="fMeetTo" style="min-width:180px">
            <option value="">Seleccionar usuario...</option>
            ${profiles.map(p=>`<option value="${p.id}" ${form.toUserId===p.id?'selected':''}>${p.role==='owner'?'ivan':p.name}</option>`).join('')}
          </select>
        </div>
        <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Fecha</div>
          <input type="date" id="fMeetDate" value="${form.date||''}" style="width:150px">
        </div>
        <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Hora (opcional)</div>
          <input type="time" id="fMeetTime" value="${form.time||''}" style="width:120px">
        </div>
        <div style="flex:1;min-width:180px"><div style="font-size:11px;font-weight:600;margin-bottom:4px">Nota</div>
          <input type="text" id="fMeetNote" placeholder="Motivo, lugar..." value="${form.note||''}" style="width:100%">
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-primary" id="btnSendMeeting">📤 Enviar solicitud</button>
        <button class="btn btn-secondary" id="btnCancelMeetForm">Cancelar</button>
      </div>
      <div id="meetingsMsg" style="margin-top:6px;font-size:13px;color:var(--red)"></div>
    </div>` : `<button class="btn btn-primary btn-sm mt-2" id="btnNewMeetForm">+ Nueva solicitud</button>`;

  const pendRecBadge = received.filter(r=>r.status==='pending').length;
  const pendSentBadge= sent.filter(r=>r.status==='counter').length;

  return `<div class="modal-overlay" id="overlay">
    <div class="modal" style="max-width:560px;width:95vw">
      <div class="modal-header">
        <h3 style="margin:0">🤝 Reuniones</h3>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body" style="padding:12px 16px">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn btn-sm ${sub==='recibidas'?'btn-primary':'btn-secondary'}" data-meet-sub="recibidas">
            📥 Recibidas${pendRecBadge>0?` <span style="background:#ef4444;color:white;border-radius:99px;padding:0 5px;font-size:10px">${pendRecBadge}</span>`:''}
          </button>
          <button class="btn btn-sm ${sub==='enviadas'?'btn-primary':'btn-secondary'}" data-meet-sub="enviadas">
            📤 Enviadas${pendSentBadge>0?` <span style="background:#3b82f6;color:white;border-radius:99px;padding:0 5px;font-size:10px">${pendSentBadge}</span>`:''}
          </button>
        </div>
        <div style="max-height:340px;overflow-y:auto;padding-right:4px">
          ${sub==='recibidas' ? recRows : sentRows}
        </div>
        ${newForm}
      </div>
    </div>
  </div>`;
}

// ── DESPACHADOS TAB ───────────────────────────────────────────────────────────
function vLocalDespachados() {
  const filter  = S.localDispFilter || 'revisar';
  const filters = S.dispFilters     || {cliente:'',tipo:[],fechaDesde:'',fechaHasta:'',montoMin:'',montoMax:''};
  const sort    = S.localDispSort   || {col:'fecha', dir:'desc'};
  const showF   = !!S.dispShowFilters;
  const showS   = !!S.dispShowSort;
  const withDet = !!S.dispExportDetalle;
  const statusMap={revisar:'despachado',check:'revisado'};
  const targetStatus=statusMap[filter]||'despachado';
  const sq=(S.localDispSearch||'').toLowerCase().trim();

  const list=(S.localOrders||[]).filter(o=>o.status===targetStatus);
  let filtered=sq?list.filter(o=>(o.order_number||'').toLowerCase().includes(sq)||(o.clients?.name||'').toLowerCase().includes(sq)):list;
  filtered=applyLocalFilters(filtered,filters);
  filtered=sortLocalList(filtered,sort);

  const fc=countActiveFilters(filters);
  const badge=fc>0?'<span style="background:#3b82f6;color:white;border-radius:99px;padding:0 5px;font-size:10px;margin-left:3px">'+fc+'</span>':'';

  const tipos=['venta','reserva','devolucion'];
  const tipoL={venta:'Venta',reserva:'Reserva',devolucion:'Dev.'};
  const activeTipos=filters.tipo||[];
  const tipoBtns=tipos.map(t=>'<button class="btn btn-sm '+(activeTipos.includes(t)?'btn-primary':'btn-secondary')+'" data-df-tipo="'+t+'">'+tipoL[t]+'</button>').join('');

  const filterPanel = showF ? `<div style="background:var(--gray-50);border-top:1px solid var(--gray-200);padding:12px 16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Cliente</div><input type="text" id="fDFCliente" value="${filters.cliente||''}" placeholder="Nombre..." style="width:140px"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Tipo</div><div style="display:flex;gap:4px">${tipoBtns}</div></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Fecha desde</div><input type="date" id="fDFDesde" value="${filters.fechaDesde||''}"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Fecha hasta</div><input type="date" id="fDFHasta" value="${filters.fechaHasta||''}"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Monto mín.</div><input type="number" id="fDFMontoMin" value="${filters.montoMin||''}" placeholder="0" style="width:90px"></div>
    <div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Monto máx.</div><input type="number" id="fDFMontoMax" value="${filters.montoMax||''}" placeholder="∞" style="width:90px"></div>
    <button class="btn btn-sm btn-secondary" id="btnDFClear">🗑️ Limpiar</button>
  </div>` : '';

  const sortCols=[{id:'fecha',lb:'Fecha'},{id:'cliente',lb:'Cliente'},{id:'monto',lb:'Monto'},{id:'numero',lb:'N°'}];
  const sortPanel = showS ? `<div style="background:var(--gray-50);border-top:1px solid var(--gray-200);padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;color:var(--gray-600)">Ordenar por:</span>
    <div style="display:flex;gap:4px">${sortCols.map(c=>'<button class="btn btn-sm '+(sort.col===c.id?'btn-primary':'btn-secondary')+'" data-ds-col="'+c.id+'">'+c.lb+'</button>').join('')}</div>
    <div style="display:flex;gap:4px">
      <button class="btn btn-sm ${sort.dir==='asc'?'btn-primary':'btn-secondary'}" data-ds-dir="asc">▲ Asc</button>
      <button class="btn btn-sm ${sort.dir==='desc'?'btn-primary':'btn-secondary'}" data-ds-dir="desc">▼ Desc</button>
    </div>
  </div>` : '';

  const rows = filtered.length===0
    ? `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📦</div>${sq||fc>0?'Sin resultados para los filtros aplicados':'Sin pedidos en esta sección'}</div></td></tr>`
    : filtered.map(o=>{
        const total=calcOrderTotal(o);
        const devueltoBtn=(o.move_type==='devolucion'&&o.status==='despachado')
          ? `<button class="btn btn-sm btn-success" data-devolver="${o.id}" style="padding:2px 8px;font-size:11px" onclick="event.stopPropagation()">✅ Devuelto</button>`:'';
        return `<tr style="cursor:pointer" data-local-order="${o.id}">
          <td style="font-size:12px;white-space:nowrap">${(o.dispatched_at||o.order_date||o.created_at||'').slice(0,10)}</td>
          <td><strong>${o.order_number||'—'}</strong></td>
          <td>${o.clients?.name||'—'}</td>
          <td>${pill(o.move_type)}</td>
          <td>${pill(o.status)}</td>
          <td style="text-align:right">${total>0?`$ ${total.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—'}</td>
          <td>${devueltoBtn}</td>
          <td><button class="btn btn-sm btn-secondary" data-local-detail="${o.id}" onclick="event.stopPropagation()" style="padding:2px 10px;font-size:11px">🔍</button></td>
        </tr>`;
      }).join('');

  return `
  <div class="card" style="padding:0">
    <div class="card-header" style="flex-wrap:wrap;gap:8px;padding:12px 16px">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm ${filter==='revisar'?'btn-primary':'btn-secondary'}" data-local-disp-filter="revisar">⏳ Por revisar</button>
        <button class="btn btn-sm ${filter==='check'?'btn-primary':'btn-secondary'}" data-local-disp-filter="check">✅ Revisados</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <input type="text" id="fLocalDispSearch" placeholder="🔍 Buscar..." value="${S.localDispSearch||''}" style="max-width:170px">
        <button class="btn btn-sm ${showF?'btn-primary':'btn-secondary'}" id="btnDFToggle">⚙️ Filtrar${badge}</button>
        <button class="btn btn-sm ${showS?'btn-primary':'btn-secondary'}" id="btnDSToggle">⇕ Ordenar</button>
        <label style="font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer;white-space:nowrap;padding:0 4px">
          <input type="checkbox" id="cbDExportDet" ${withDet?'checked':''}> Con detalle
        </label>
        <button class="btn btn-sm btn-secondary" id="btnExportDispCSV">📊 Excel</button>
        <button class="btn btn-sm btn-secondary" id="btnExportDispPDF">🖨️ PDF</button>
      </div>
    </div>
    ${filterPanel}${sortPanel}
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="cursor:pointer;white-space:nowrap" onclick="S.localDispSort={col:'fecha',dir:(S.localDispSort?.col==='fecha'&&S.localDispSort?.dir==='desc'?'asc':'desc')};draw()">${sort.col==='fecha'?(sort.dir==='asc'?'Fecha ↑':'Fecha ↓'):'Fecha'}</th>
          <th>N°</th>
          <th style="cursor:pointer" onclick="S.localDispSort={col:'cliente',dir:(S.localDispSort?.col==='cliente'&&S.localDispSort?.dir==='desc'?'asc':'desc')};draw()">${sort.col==='cliente'?(sort.dir==='asc'?'Cliente ↑':'Cliente ↓'):'Cliente'}</th>
          <th>Tipo</th>
          <th>Estado</th>
          <th style="cursor:pointer;text-align:right" onclick="S.localDispSort={col:'monto',dir:(S.localDispSort?.col==='monto'&&S.localDispSort?.dir==='desc'?'asc':'desc')};draw()">${sort.col==='monto'?(sort.dir==='asc'?'Total ↑':'Total ↓'):'Total'}</th>
          <th></th>
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}


// ── MODAL: Day detail from calendar ──────────────────────────────────────────
function mLocalDay() {
  if (S.modal !== 'localDay') return '';
  const date = S.localSelectedDate || '';
  const orders = (S.localOrders||[]).filter(o =>
    (o.order_date||o.created_at||'').slice(0,10) === date &&
    (o.status === 'pendiente' || o.status === 'borrador')
  );
  const orderRows = orders.length === 0
    ? `<div class="empty-state" style="padding:16px"><div class="empty-icon" style="font-size:24px">📋</div><div style="font-size:13px;color:var(--gray-400)">Sin pedidos para este día</div></div>`
    : orders.map(o => {
        const total = (o.local_order_items||[]).reduce((s,i)=>{
          const kg=(i.local_order_rolls||[]).reduce((ss,r)=>ss+parseFloat(r.quantity||0),0);
          return s+kg*parseFloat(i.price||0);
        },0);
        const stColor = o.status==='borrador'?'#9ca3af':'#3b82f6';
        return `<div style="padding:10px 12px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" data-local-order="${o.id}" data-close-day>
          <div>
            <div style="font-weight:600;font-size:13px">${o.order_number||'—'} · ${o.clients?.name||'Sin cliente'}</div>
            <div style="font-size:11px;color:var(--gray-500)">${o.move_type||'—'}</div>
          </div>
          <div style="text-align:right">
            <span style="background:${stColor};color:white;padding:2px 8px;border-radius:99px;font-size:11px">${o.status}</span>
            <div style="font-size:12px;color:var(--gray-500);margin-top:2px">${total>0?`$ ${total.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—'}</div>
          </div>
        </div>`;
      }).join('');
  return `<div class="modal-overlay" id="overlay">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <div class="modal-title">📅 ${date}</div>
        <button class="btn btn-secondary btn-sm" data-close>✕</button>
      </div>
      <div class="modal-body">
        ${orderRows}
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
          <button class="btn btn-primary btn-sm" data-local-new-order data-move-type="venta" data-date="${date}">+ Nueva venta</button>
          <button class="btn btn-secondary btn-sm" data-local-new-order data-move-type="reserva" data-date="${date}">+ Nueva reserva</button>
          <button class="btn btn-secondary btn-sm" data-local-new-order data-move-type="devolucion" data-date="${date}">+ Nueva devolución</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close>Cerrar</button>
      </div>
    </div>
  </div>`;
}

// ── MODAL: Nuevo / Editar pedido local (6-step wizard) ───────────────────────
function mLocalOrder() {
  if (S.modal !== 'localOrder') return '';
  const draft = S.localOrderDraft;
  if (!draft) return '';
  const step = S.localOrderStep || 1;

  const progressBar = `<div style="display:flex;gap:3px;margin-bottom:16px">
    ${[1,2,3,4,5,6].map(s => `<div style="flex:1;height:4px;border-radius:2px;background:${s<=step?'var(--blue)':'var(--gray-200)'}"></div>`).join('')}
  </div>
  <div style="font-size:11px;color:var(--gray-400);margin-bottom:12px;text-align:center">Paso ${step} de 6</div>`;

  const btnVolver = step > 1 ? `<button class="btn btn-secondary" id="btnLocalOrderBack">← Volver</button>` : '';
  const btnBorrador = `<button class="btn btn-secondary" id="btnSaveLocalDraft" ${S.loading?'disabled':''}>💾 Guardar borrador</button>`;

  // ── STEP 1: Tipo de movimiento ───────────────────────────────────────────
  if (step === 1) {
    const date = draft.date || '';
    return `<div class="modal-overlay" id="overlay">
      <div class="modal" style="max-width:480px">
        <div class="modal-header">
          <div class="modal-title">🛒 ${draft.orderId?'Editar':'Nuevo'} pedido — Paso 1: Tipo</div>
          <button class="btn btn-secondary btn-sm" data-close>✕</button>
        </div>
        <div class="modal-body">
          ${progressBar}
          ${date?`<div style="margin-bottom:14px;padding:8px 12px;background:var(--gray-50);border-radius:6px;font-size:13px">📅 <strong>${date}</strong></div>`:''}
          <div style="font-size:13px;font-weight:600;margin-bottom:10px">¿Qué tipo de movimiento?</div>
          <div style="display:flex;gap:10px;margin-bottom:20px">
            ${['venta','reserva','devolucion'].map(t => `<button class="btn ${draft.moveType===t?'btn-primary':'btn-secondary'}" style="flex:1;padding:14px 8px;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:4px" data-move-type="${t}">
              ${t==='venta'?'🛒':t==='reserva'?'📅':'🔄'}
              <span style="font-size:12px">${t.charAt(0).toUpperCase()+t.slice(1)}</span>
            </button>`).join('')}
          </div>
          ${S.err?`<div class="alert alert-error">${S.err}</div>`:''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-close>Cancelar</button>
          ${btnBorrador}
          <button class="btn btn-primary" id="btnLocalStep2">Siguiente →</button>
        </div>
      </div>
    </div>`;
  }

  // ── STEP 2: Cliente ──────────────────────────────────────────────────────
  if (step === 2) {
    const cq = (draft.clientSearch||'').toLowerCase();
    const clientRows = cq.length >= 1
      ? (S.localClients||[]).filter(c => c.name.toLowerCase().includes(cq)||(c.phone||'').includes(cq))
          .slice(0,8).map(c => `<div class="client-option" data-pick-client="${c.id}" data-pick-name="${c.name}" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--gray-100)">${c.name}${c.phone?` <span style="font-size:11px;color:var(--gray-400)">${c.phone}</span>`:''}</div>`).join('')
      : '';
    return `<div class="modal-overlay" id="overlay">
      <div class="modal" style="max-width:500px">
        <div class="modal-header">
          <div class="modal-title">🛒 Paso 2: Cliente</div>
          <button class="btn btn-secondary btn-sm" data-close>✕</button>
        </div>
        <div class="modal-body">
          ${progressBar}
          <div class="form-group">
            <label>Buscar cliente existente</label>
            <input type="text" id="fLocalClientSearch" value="${draft.clientSearch||''}" placeholder="Nombre o teléfono...">
            ${draft.selectedClient?`<div style="margin-top:6px;padding:6px 10px;background:#eff6ff;border-radius:6px;font-size:13px">✓ <strong>${draft.selectedClient.name}</strong> <button class="btn btn-sm btn-secondary" id="btnClearLocalClient" style="padding:1px 6px;font-size:11px">✕</button></div>`:''}
            ${clientRows?`<div style="border:1px solid var(--gray-200);border-radius:6px;margin-top:4px;max-height:180px;overflow-y:auto">${clientRows}</div>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <span style="font-size:12px;color:var(--gray-400)">— o —</span>
            <button class="btn btn-sm btn-secondary" id="btnNewLocalClient">${draft.showNewClient?'▼ Ocultar formulario':'+ Nuevo cliente'}</button>
          </div>
          ${draft.showNewClient?`
          <div style="padding:12px;background:var(--gray-50);border-radius:8px;margin-bottom:12px">
            <div style="font-size:12px;font-weight:600;margin-bottom:8px">Nuevo cliente</div>
            <div class="form-group mb-2"><label style="font-size:11px">Nombre <span style="color:var(--red)">(* obligatorio)</span></label><input type="text" id="fNLCName" value="${draft.newClient?.name||''}" placeholder="Nombre completo"></div>
            <div class="form-group mb-2"><label style="font-size:11px">Empresa</label><input type="text" id="fNLCEmpresa" value="${draft.newClient?.empresa||''}" placeholder="Empresa (opcional)"></div>
            <div class="form-row mb-2">
              <div class="form-group mb-0"><label style="font-size:11px">CUIT</label><input type="text" id="fNLCCuit" value="${draft.newClient?.cuit||''}" placeholder="30-..."></div>
              <div class="form-group mb-0"><label style="font-size:11px">Teléfono</label><input type="text" id="fNLCPhone" value="${draft.newClient?.phone||''}" placeholder="+54..."></div>
            </div>
            <div class="form-group mb-2"><label style="font-size:11px">Dirección</label><input type="text" id="fNLCAddr" value="${draft.newClient?.address||''}" placeholder="Dirección"></div>
            <div class="form-group mb-0"><label style="font-size:11px">Notas</label><textarea id="fNLCNotes" rows="2" placeholder="Notas...">${draft.newClient?.notes||''}</textarea></div>
          </div>`:''}
          ${S.err?`<div class="alert alert-error">${S.err}</div>`:''}
        </div>
        <div class="modal-footer">
          ${btnVolver}
          <button class="btn btn-secondary" data-close>Cancelar</button>
          ${btnBorrador}
          <button class="btn btn-primary" id="btnLocalStep3">Siguiente →</button>
        </div>
      </div>
    </div>`;
  }

  // ── STEP 3: Artículos ────────────────────────────────────────────────────
  if (step === 3) {
    const pq = (draft.productSearch||'').toLowerCase();
    const allColors = (S.products||[]).flatMap(p => (p.product_colors||[]).map(pc=>({
      id: pc.id, name: p.name, color: pc.color, unit: p.unit||'kg',
      stock: (pc.total_stock||0) - (pc.reserved_stock||0),
    })));
    const matchColors = pq.length >= 1
      ? allColors.filter(pc => pc.name.toLowerCase().includes(pq)||pc.color.toLowerCase().includes(pq)).slice(0,8)
      : [];
    const itemsHtml = (draft.items||[]).map((item,idx) => {
      const pc = allColors.find(x=>x.id===item.productColorId)||{};
      const rollCount = (item.rolls||[]).length;
      return `<div style="padding:10px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:13px">${pc.name||'?'} · <span style="color:var(--gray-500)">${pc.color||'?'}</span></div>
          <div style="font-size:11px;color:var(--gray-400)">Stock: ${pc.stock??'—'} · ${rollCount} rollo${rollCount!==1?'s':''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-sm btn-secondary" data-rm-local-roll="${idx}" style="padding:2px 8px" ${rollCount<=1?'disabled':''}>−</button>
          <span style="font-size:13px;font-weight:600;min-width:20px;text-align:center">${rollCount}</span>
          <button class="btn btn-sm btn-primary" data-add-local-roll="${idx}" style="padding:2px 8px">+</button>
          <button class="btn btn-sm btn-danger" data-rm-local-item="${idx}" style="padding:2px 8px">🗑️</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="modal-overlay" id="overlay">
      <div class="modal" style="max-width:580px">
        <div class="modal-header">
          <div class="modal-title">🛒 Paso 3: Artículos</div>
          <button class="btn btn-secondary btn-sm" data-close>✕</button>
        </div>
        <div class="modal-body" style="max-height:65vh;overflow-y:auto">
          ${progressBar}
          <div class="form-group">
            <input type="text" id="fLocalProductSearch" value="${draft.productSearch||''}" placeholder="🔍 Buscar artículo o color...">
            ${matchColors.length>0?`<div style="border:1px solid var(--gray-200);border-radius:6px;margin-top:4px;max-height:160px;overflow-y:auto">
              ${matchColors.map(pc=>`<div class="client-option" data-add-local-item="${pc.id}" data-item-name="${pc.name}" data-item-color="${pc.color}" data-item-unit="${pc.unit}" style="padding:7px 12px;cursor:pointer;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between">
                <span>${pc.name} · <span style="color:var(--gray-500)">${pc.color}</span></span>
                <span style="font-size:11px;color:var(--gray-400)">${pc.stock} disp.</span>
              </div>`).join('')}
            </div>`:''}
          </div>
          ${itemsHtml||`<div class="empty-state" style="padding:20px"><div class="empty-icon">🧵</div>Buscá y agregá artículos</div>`}
          ${S.err?`<div class="alert alert-error">${S.err}</div>`:''}
        </div>
        <div class="modal-footer">
          ${btnVolver}
          <button class="btn btn-secondary" data-close>Cancelar</button>
          ${btnBorrador}
          <button class="btn btn-primary" id="btnLocalStep4">Siguiente →</button>
        </div>
      </div>
    </div>`;
  }

  // ── STEP 4: Precios ──────────────────────────────────────────────────────
  if (step === 4) {
    const allColors = (S.products||[]).flatMap(p => (p.product_colors||[]).map(pc=>({id:pc.id,name:p.name,color:pc.color})));
    const priceHtml = (draft.items||[]).length === 0
      ? `<div class="empty-state" style="padding:20px"><div class="empty-icon">🧵</div>No hay artículos. Volvé al paso 3.</div>`
      : (draft.items||[]).map((item,idx) => {
          const pc = allColors.find(x=>x.id===item.productColorId)||{};
          return `<div style="padding:10px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:8px">
            <div style="font-weight:600;font-size:13px;margin-bottom:8px">${pc.name||'?'} · <span style="color:var(--gray-500)">${pc.color||'?'}</span></div>
            <div style="font-size:11px;color:var(--gray-400);margin-bottom:8px">Todos los rollos del mismo artículo tienen el mismo precio</div>
            <div class="form-row mb-0">
              <div class="form-group mb-0"><label style="font-size:11px">Precio por kg</label>
                <input type="number" min="0" step="0.01" id="fLIPrice_${idx}" value="${item.price||''}" placeholder="0.00"></div>
              <div class="form-group mb-0"><label style="font-size:11px">Moneda</label>
                <select id="fLICur_${idx}">
                  <option value="ARS"${(item.priceCurrency||'ARS')==='ARS'?' selected':''}>ARS $</option>
                  <option value="USD"${item.priceCurrency==='USD'?' selected':''}>USD</option>
                </select></div>
            </div>
          </div>`;
        }).join('');
    return `<div class="modal-overlay" id="overlay">
      <div class="modal" style="max-width:520px">
        <div class="modal-header">
          <div class="modal-title">🛒 Paso 4: Precios</div>
          <button class="btn btn-secondary btn-sm" data-close>✕</button>
        </div>
        <div class="modal-body" style="max-height:65vh;overflow-y:auto">
          ${progressBar}
          ${priceHtml}
          ${S.err?`<div class="alert alert-error">${S.err}</div>`:''}
        </div>
        <div class="modal-footer">
          ${btnVolver}
          <button class="btn btn-secondary" data-close>Cancelar</button>
          ${btnBorrador}
          <button class="btn btn-primary" id="btnLocalStep5">Siguiente →</button>
        </div>
      </div>
    </div>`;
  }

  // ── STEP 5: Forma de pago ────────────────────────────────────────────────
  if (step === 5) {
    return `<div class="modal-overlay" id="overlay">
      <div class="modal" style="max-width:480px">
        <div class="modal-header">
          <div class="modal-title">🛒 Paso 5: Forma de pago</div>
          <button class="btn btn-secondary btn-sm" data-close>✕</button>
        </div>
        <div class="modal-body">
          ${progressBar}
          <div class="form-row mb-3">
            <div class="form-group mb-0"><label>Estado del pago</label>
              <select id="fLPayStatus">
                <option value="pendiente"${(draft.paymentStatus||'pendiente')==='pendiente'?' selected':''}>Pendiente</option>
                <option value="pagado"${draft.paymentStatus==='pagado'?' selected':''}>Pagado</option>
              </select></div>
          </div>
          <div class="form-group"><label>Forma de pago</label>
            <select id="fLPayType">
              <option value="">—</option>
              <option value="efectivo_ars"${draft.paymentType==='efectivo_ars'?' selected':''}>Efectivo $</option>
              <option value="efectivo_usd"${draft.paymentType==='efectivo_usd'?' selected':''}>Efectivo USD</option>
              <option value="transferencia"${draft.paymentType==='transferencia'?' selected':''}>Transferencia</option>
              <option value="cheque"${draft.paymentType==='cheque'?' selected':''}>Cheque</option>
              <option value="cuenta_corriente"${draft.paymentType==='cuenta_corriente'?' selected':''}>Cuenta Corriente</option>
            </select></div>
          <div class="form-group"><label>Notas</label>
            <textarea id="fLNotes" rows="3" placeholder="Observaciones...">${draft.notes||''}</textarea></div>
          ${S.err?`<div class="alert alert-error">${S.err}</div>`:''}
        </div>
        <div class="modal-footer">
          ${btnVolver}
          <button class="btn btn-secondary" data-close>Cancelar</button>
          ${btnBorrador}
          <button class="btn btn-primary" id="btnLocalStep6">Siguiente →</button>
        </div>
      </div>
    </div>`;
  }

  // ── STEP 6: Rollos ───────────────────────────────────────────────────────
  const allColors6 = (S.products||[]).flatMap(p => (p.product_colors||[]).map(pc=>({id:pc.id,name:p.name,color:pc.color})));
  const grandTotal = (draft.items||[]).reduce((s,item) => {
    const kg=(item.rolls||[]).reduce((ss,v)=>ss+parseFloat(v||0),0);
    return s+kg*parseFloat(item.price||0);
  },0);
  const rollsHtml = (draft.items||[]).length === 0
    ? `<div class="empty-state" style="padding:16px"><div class="empty-icon">🧵</div>No hay artículos</div>`
    : (draft.items||[]).map((item,idx) => {
        const pc = allColors6.find(x=>x.id===item.productColorId)||{};
        const totalKg = (item.rolls||[]).reduce((s,v)=>s+parseFloat(v||0),0);
        const subtotal = totalKg * parseFloat(item.price||0);
        return `<div style="padding:10px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-weight:600;font-size:13px">${pc.name||'?'} · <span style="color:var(--gray-500)">${pc.color||'?'}</span></div>
            <div style="display:flex;gap:4px">
              <button class="btn btn-sm btn-secondary" data-rm-local-roll="${idx}" style="padding:2px 8px" ${item.rolls.length<=1?'disabled':''}>−</button>
              <span style="font-size:12px;padding:2px 6px">${item.rolls.length} rollos</span>
              <button class="btn btn-sm btn-primary" data-add-local-roll="${idx}" style="padding:2px 8px">+</button>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px">
            ${item.rolls.map((v,i)=>`<div class="form-group mb-0">
              <label style="font-size:10px">Rollo ${i+1} (kg)</label>
              <input type="number" min="0" step="0.001" id="fLRoll_${idx}_${i}" value="${v||''}" placeholder="0.000" style="font-size:12px">
            </div>`).join('')}
          </div>
          ${subtotal>0?`<div style="text-align:right;font-size:12px;color:var(--blue);margin-top:4px">Subtotal: $ ${subtotal.toLocaleString('es-AR',{minimumFractionDigits:2})}</div>`:''}
        </div>`;
      }).join('');
  return `<div class="modal-overlay" id="overlay">
    <div class="modal" style="max-width:620px">
      <div class="modal-header">
        <div>
          <div class="modal-title">🛒 Paso 6: Kg por rollo</div>
          <div style="font-size:12px;color:var(--gray-400)">${draft.selectedClient?.name||'Sin cliente'} · ${draft.moveType||'venta'}</div>
        </div>
        <button class="btn btn-secondary btn-sm" data-close>✕</button>
      </div>
      <div class="modal-body" style="max-height:65vh;overflow-y:auto">
        ${progressBar}
        ${rollsHtml}
        ${grandTotal>0?`<div style="text-align:right;font-weight:700;font-size:15px;color:var(--blue);padding:8px 0;border-top:2px solid var(--gray-200)">TOTAL: $ ${grandTotal.toLocaleString('es-AR',{minimumFractionDigits:2})}</div>`:''}
        ${S.err?`<div class="alert alert-error mt-2">${S.err}</div>`:''}
      </div>
      <div class="modal-footer">
        ${btnVolver}
        <button class="btn btn-secondary" data-close>Cancelar</button>
        ${btnBorrador}
        <button class="btn btn-primary" id="btnConfirmLocalOrder" ${S.loading?'disabled':''}>
          ${S.loading?'<div class="spinner"></div>':'✅ Confirmar pedido'}
        </button>
        ${draft.orderId&&draft.status==='pendiente'?`<button class="btn btn-success" id="btnDispatchLocalOrder" ${S.loading?'disabled':''}>🚀 Despachar</button>`:''}
      </div>
    </div>
  </div>`;
}
