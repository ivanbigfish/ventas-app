// ── MODAL: Admin revisa pedido local ────────────────────────────────────────
function mAdminLocalReview() {
  if (S.modal !== 'adminLocalReview') return '';
  const o = S.localOrderDraft;
  if (!o) return '';
  const items = (o.local_order_items||[]);
  const grandTotal = items.reduce((s,i)=>{
    const kg=(i.local_order_rolls||[]).reduce((ss,r)=>ss+parseFloat(r.quantity||0),0);
    return s+kg*parseFloat(i.price||0);
  },0);
  const itemRows = items.map(i=>{
    const name = i.product_colors?.products?.name||'—';
    const color = i.product_colors?.color||'—';
    const kg = (i.local_order_rolls||[]).reduce((s,r)=>s+parseFloat(r.quantity||0),0);
    const sub = kg*parseFloat(i.price||0);
    return `<tr>
      <td style="padding:6px 8px">${name} · ${color}</td>
      <td style="text-align:right;padding:6px 8px">${kg.toFixed(3)} kg</td>
      <td style="text-align:right;padding:6px 8px">${i.price?`$ ${parseFloat(i.price).toFixed(2)}`:'—'}</td>
      <td style="text-align:right;padding:6px 8px;font-weight:600">${sub>0?`$ ${sub.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—'}</td>
    </tr>`;
  }).join('');
  const local = S.locals.find(l=>l.id===o.local_id);
  const mods = (o.local_order_modifications||[]);
  return `<div class="modal-overlay" id="overlay">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <div><div class="modal-title">📋 ${o.order_number} — Revisión admin</div>
          <div style="font-size:12px;color:var(--gray-400)">${local?.name||''} · ${o.clients?.name||'Sin cliente'}</div></div>
        <button class="btn btn-secondary btn-sm" data-close>✕</button>
      </div>
      <div class="modal-body" style="max-height:65vh;overflow-y:auto">
        <div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap">
          <div><span style="font-size:11px;color:var(--gray-500)">TIPO</span><br>${pill(o.move_type)}</div>
          <div><span style="font-size:11px;color:var(--gray-500)">DESPACHO</span><br><strong>${o.dispatch_type||'—'}</strong></div>
          <div><span style="font-size:11px;color:var(--gray-500)">PAGO</span><br>${pill(o.payment_status)}${o.payment_amount?` $ ${parseFloat(o.payment_amount).toLocaleString('es-AR')}`:''}
          </div>
        </div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:12px">
          <thead><tr style="background:var(--gray-50)"><th style="padding:6px 8px;text-align:left">Artículo</th><th style="text-align:right;padding:6px 8px">Kg</th><th style="text-align:right;padding:6px 8px">Precio</th><th style="text-align:right;padding:6px 8px">Subtotal</th></tr></thead>
          <tbody>${itemRows}</tbody>
          <tfoot><tr style="border-top:2px solid var(--gray-200)"><td colspan="3" style="padding:8px;font-weight:700">TOTAL</td><td style="text-align:right;padding:8px;font-weight:700;color:var(--blue)">$ ${grandTotal.toLocaleString('es-AR',{minimumFractionDigits:2})}</td></tr></tfoot>
        </table>
        ${o.notes?`<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">Nota: ${o.notes}</div>`:''}
        ${mods.length>0?`<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:var(--orange);margin-bottom:4px">MODIFICACIONES ADMIN</div>${mods.map(m=>`<div style="font-size:12px;padding:6px 8px;background:#fff7ed;border-radius:4px;margin-bottom:4px"><strong>${(m.created_at||'').slice(0,10)}</strong>: ${m.description||'—'} — <em>${m.note}</em></div>`).join('')}</div>`:''}
        <div style="border-top:1px solid var(--gray-200);padding-top:12px">
          <div style="font-size:12px;font-weight:600;margin-bottom:6px">Modificación admin (opcional)</div>
          <input type="text" id="fAdminModDesc" placeholder="¿Qué modificás?" style="margin-bottom:6px">
          <textarea id="fAdminModNote" rows="2" placeholder="Justificación obligatoria si modificás algo..."></textarea>
        </div>
        ${S.err?`<div class="alert alert-error mt-2">${S.err}</div>`:''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close>Cerrar</button>
        ${o.status==='despachado'?`<button class="btn btn-success" id="btnReviewLocalOrder" ${S.loading?'disabled':''}>
          ${S.loading?'<div class="spinner"></div>':'✅ Marcar revisado → Historial'}
        </button>`:''}
      </div>
    </div>
  </div>`;
}

// ============================================================
// DRAW
// ============================================================
async function draw() {
  const { view, tab, modal, profile } = S;

  if (view === 'loading') {
    render(`<div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:10px">
      <div class="spinner spinner-lg"></div>
    </div>`);
    return;
  }

  if (view === 'login') { vLogin(); return; }

  // Build page content
  let tabs, content;
  if (view === 'local') {
    render(vLocal());
    const localModal = {
      localOrder:        mLocalOrder(),
      localDispatch:     mLocalDispatch(),
      adminLocalReview:  mAdminLocalReview(),
      localDay:          mLocalDay(),
      localOrderDetail:  mLocalOrderDetail(),
      meetings:          mMeetings(),
    }[modal] || '';
    if (localModal) app.insertAdjacentHTML('beforeend', localModal);
    bindAll();
    return;
  }

  if (view === 'seller') {
    tabs = [
      { id:'calendario', icon:'📅', label:'Calendario' },
      { id:'cartera',    icon:'👥', label:'Mi cartera' },
    ];
    if (isBulltex()) {
      tabs.push({ id:'stock',   icon:'🧵', label:'Stock' });
      tabs.push({ id:'pedidos', icon:'📋', label:'Pedidos', badge: S.pendingCount||null });
    }
    tabs.push({ id:'reportes', icon:'📊', label:'Reportes' });
    if      (tab==='cartera'              ) content = vMyClients();
    else if (tab==='stock'   && isBulltex()) content = vStock();
    else if (tab==='pedidos' && isBulltex()) content = vPedidos();
    else if (tab==='reportes'             ) content = vSellerReportes();
    else                                     content = vCalendar();
  } else {
    // admin or owner
    if (isBulltex()) {
      tabs = [
        { id:'acciones',    icon:'✅', label:'Acciones'    },
        { id:'vendedores',  icon:'👤', label:'Vendedores',  badge: S.pendingCount||null },
        { id:'clientes',    icon:'👥', label:'Clientes'     },
        { id:'locales',     icon:'🏪', label:'Locales'      },
        { id:'pagos',       icon:'💰', label:'Pagos'        },
        { id:'reportes',    icon:'📊', label:'Reportes'     },
        { id:'stock',       icon:'🧵', label:'Stock'        },
        { id:'micalendario',icon:'📅', label:'Mi Calendario'},
        { id:'micartera',   icon:'🗂',  label:'Mi Cartera'  },
      ];
    } else {
      tabs = [
        { id:'acciones',    icon:'✅', label:'Acciones'    },
        { id:'vendedores',  icon:'👤', label:'Vendedores'  },
        { id:'clientes',    icon:'👥', label:'Clientes'     },
        { id:'pagos',       icon:'💰', label:'Pagos'        },
        { id:'reportes',    icon:'📊', label:'Reportes'     },
        { id:'micalendario',icon:'📅', label:'Mi Calendario'},
        { id:'micartera',   icon:'🗂',  label:'Mi Cartera'  },
      ];
    }
    switch (tab) {
      case 'vendedores':   content = isBulltex() ? vAdminVendSection() : vAdminVendedores(); break;
      case 'clientes':     content = vAdminClientes(); break;
      case 'locales':      content = isBulltex() ? vAdminLocalesSection() : vAdminLocales(); break;
      case 'reportes':     content = vAdminReportes(); break;
      case 'stock':        content = isBulltex() ? vStock()   : ''; break;
      case 'pedidos':      content = isBulltex() ? vPedidos() : ''; break;
      case 'remitos':      content = isBulltex() ? vRemitos() : ''; break;
      case 'pagos':        content = vAdminPagos(); break;
      case 'micalendario': content = vCalendar(); break;
      case 'micartera':    content = vMyClients(); break;
      default:             content = vAdminAcciones(); break;
    }
  }

  try {
    app.innerHTML = nav(tabs) + companyBar() + `<div class="page">${content}</div>`;
  } catch(err) {
    console.error('[draw] render error:', err);
    app.innerHTML = `<div class="page"><div class="card" style="color:red;padding:20px">Error al renderizar: ${err.message}<br><small>${err.stack||''}</small></div></div>`;
    return;
  }

  // Append modal
  const modalHtml = {
    day:          mDay(),
    addAction:    mAddAction(),
    respond:      mRespond(),
    addClient:    mAddClient(false),
    addClientAdm: mAddClient(true),
    addSeller:    mAddSeller(),
    newOrder:     mNewOrder(),
    orderDetail:  mOrderDetail(),
    newRemito:       mNewRemito(),
    remitoDetail:    mRemitoDetail(),
    editStock:       mEditStock(),
    cuentaCorriente: mCuentaCorriente(),
    localOrder:        mLocalOrder(),
    localDispatch:     mLocalDispatch(),
    adminLocalReview:  mAdminLocalReview(),
    localOrderDetail:  mLocalOrderDetail(),
    meetings:          mMeetings(),
  }[modal] || '';
  if (modalHtml) app.insertAdjacentHTML('beforeend', modalHtml);

  bindAll();
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindAll() {
  // NAV TABS
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.addEventListener('click', async () => {
    S.tab = b.dataset.tab;
    if (['acciones','reportes'].includes(S.tab)) await dbActions(S.year, S.month);
    if (S.tab==='clientes')     { await dbClients('all'); await dbSellers(); await dbCompanies(); }
    if (S.tab==='locales')      { await dbLocalOrders(null); await dbLocals(); S.adminLocalSubTab = S.adminLocalSubTab||'activos'; }
    if (S.tab!=='locales')      S.adminViewLocalId = null;
    if (S.tab==='vendedores' && !S.adminVendTab) S.adminVendTab = 'equipo';
    if (S.tab==='vendedores')   { await dbSellers(); await dbClients('all'); await dbCompanies(); }
    if (S.tab==='micalendario') { await dbClients(S.profile.id); await dbActions(S.year, S.month); }
    if (S.tab==='micartera')    { await dbClients(S.profile.id); }
    if (S.tab==='pagos')        { await dbClients('all'); if(S.pagosTab==='consultar') await dbAllCollections(); }
    if (S.tab==='stock'   && isBulltex()) await dbProducts();
    if (S.tab==='pedidos' && isBulltex()) { await dbOrders(); if (S.profile.role==='seller') await dbProducts(); }
    if (S.tab==='remitos' && isBulltex()) { await Promise.all([dbOrders(), dbRemitos()]); }
    draw();
  }));

  // ADMIN: Vendedores sub-tabs
  document.querySelectorAll('[data-admin-vend-tab]').forEach(b=>b.addEventListener('click', async ()=>{
    const sub = b.dataset.adminVendTab;
    S.adminVendTab = sub;
    if (sub==='pedidos' && isBulltex()) await dbOrders();
    if (sub==='remitos' && isBulltex()) await Promise.all([dbOrders(), dbRemitos()]);
    if (sub==='equipo') { await dbSellers(); await dbClients('all'); }
    draw();
  }));

  // ADMIN: Locales store selector
  document.querySelectorAll('[data-admin-local-id]').forEach(b=>b.addEventListener('click', ()=>{
    S.adminLocalId = b.dataset.adminLocalId;
    S.adminLocalSubTab = S.adminLocalSubTab || 'activos';
    draw();
  }));

  // ADMIN: Locales sub-tab (activos/despachados)
  document.querySelectorAll('[data-admin-local-sub]').forEach(b=>b.addEventListener('click', ()=>{
    S.adminLocalSubTab = b.dataset.adminLocalSub;
    draw();
  }));

  // ADMIN: Reload local orders
  document.getElementById('btnReloadAdminLocal')?.addEventListener('click', async ()=>{
    await dbLocalOrders(null);
    draw();
  });

  // LOGOUT

  // ── MEETINGS ────────────────────────────────────────────────────────────────
  document.getElementById('btnOpenMeetings')?.addEventListener('click', async () => {
    if (!S.allProfiles?.length) await dbProfiles();
    await dbMeetingRequests();
    S.meetingsSubTab = 'recibidas';
    S.meetingForm = null;
    S.meetingCounterForm = null;
    openModal('meetings');
  });
  document.querySelectorAll('[data-meet-sub]').forEach(b=>b.addEventListener('click',()=>{
    S.meetingsSubTab = b.dataset.meetSub; draw();
  }));
  document.getElementById('btnNewMeetForm')?.addEventListener('click',()=>{
    S.meetingForm = { toUserId:'', date:'', time:'', note:'' }; draw();
  });
  document.getElementById('btnCancelMeetForm')?.addEventListener('click',()=>{
    S.meetingForm = null; draw();
  });
  document.getElementById('btnSendMeeting')?.addEventListener('click', async ()=>{
    const toId   = document.getElementById('fMeetTo')?.value;
    const date   = document.getElementById('fMeetDate')?.value;
    const time   = document.getElementById('fMeetTime')?.value;
    const note   = document.getElementById('fMeetNote')?.value?.trim();
    const toName = (S.allProfiles||[]).find(p=>p.id===toId)?.name||'?';
    const msg    = document.getElementById('meetingsMsg');
    if (!toId) { if(msg) msg.textContent='Seleccioná un usuario'; return; }
    if (!date) { if(msg) msg.textContent='Seleccioná una fecha'; return; }
    const err = await dbCreateMeeting({toUserId:toId, date, time, note, toName});
    if (err) { if(msg) msg.style.color='var(--red)'; if(msg) msg.textContent=err; return; }
    S.meetingForm = null;
    await dbMeetingRequests();
    draw();
  });
  document.querySelectorAll('[data-meet-accept]').forEach(b=>b.addEventListener('click', async ()=>{
    await dbRespondMeeting(b.dataset.meetAccept,'accept',{}); draw();
  }));
  document.querySelectorAll('[data-meet-reject]').forEach(b=>b.addEventListener('click', async ()=>{
    await dbRespondMeeting(b.dataset.meetReject,'reject',{}); draw();
  }));
  document.querySelectorAll('[data-meet-counter]').forEach(b=>b.addEventListener('click',()=>{
    S.meetingCounterForm = { id:b.dataset.meetCounter, date:'', time:'', note:'' }; draw();
  }));
  document.querySelectorAll('[data-meet-send-counter]').forEach(b=>b.addEventListener('click', async ()=>{
    const date = document.getElementById('fCounterDate')?.value;
    const time = document.getElementById('fCounterTime')?.value;
    const note = document.getElementById('fCounterNote')?.value?.trim();
    if (!date) return;
    await dbRespondMeeting(b.dataset.meetSendCounter,'counter',{date,time,note});
    S.meetingCounterForm = null; draw();
  }));
  document.querySelectorAll('[data-meet-accept-counter]').forEach(b=>b.addEventListener('click', async ()=>{
    await dbRespondMeeting(b.dataset.meetAcceptCounter,'accept-counter',{}); draw();
  }));

  // ── PAGOS ─────────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-pagos-tab]').forEach(b=>b.addEventListener('click', async ()=>{
    S.pagosTab=b.dataset.pagosTab; S.pagosClientId=null;
    S.pagosForm={cobPayType:'',cobAmount:'',cobTC:''};
    if(S.pagosTab==='consultar') await dbAllCollections();
    draw();
  }));
  document.querySelectorAll('[data-pagos-client]').forEach(b=>b.addEventListener('click',()=>{
    S.pagosClientId=b.dataset.pagosClient; S.pagosForm={cobPayType:'',cobAmount:'',cobTC:''}; draw();
  }));
  document.getElementById('fPagosClientSearch')?.addEventListener('input',e=>{
    const v=e.target.value; const pos=e.target.selectionStart;
    S.pagosClientSearch=v; draw();
    const el=document.getElementById('fPagosClientSearch');
    if(el){el.focus();el.setSelectionRange(pos,pos);}
  });
  document.getElementById('fPagosColSearch')?.addEventListener('input',e=>{
    const v=e.target.value; const pos=e.target.selectionStart;
    S.pagosColSearch=v; draw();
    const el=document.getElementById('fPagosColSearch');
    if(el){el.focus();el.setSelectionRange(pos,pos);}
  });
  document.getElementById('fPagosColPayType')?.addEventListener('change',e=>{S.pagosColPayType=e.target.value;draw();});
  document.getElementById('fPagosColCurrency')?.addEventListener('change',e=>{S.pagosColCurrency=e.target.value;draw();});
  document.querySelectorAll('[data-pagos-col-sort]').forEach(b=>b.addEventListener('click',()=>{
    const col=b.dataset.pagosColSort;
    S.pagosColSort={col,dir:(S.pagosColSort?.col===col&&S.pagosColSort?.dir==='desc'?'asc':'desc')};draw();
  }));
  document.getElementById('fPagosPayType')?.addEventListener('change',e=>{
    if(!S.pagosForm)S.pagosForm={};
    S.pagosForm.cobPayType=e.target.value; S.pagosForm.cobAmount=document.getElementById('fPagosAmt')?.value||'';
    S.pagosForm.cobTC=document.getElementById('fPagosTC')?.value||''; draw();
  });
  document.getElementById('btnAplicarPago')?.addEventListener('click', async ()=>{
    const pt  = document.getElementById('fPagosPayType')?.value;
    const amt = parseFloat(document.getElementById('fPagosAmt')?.value||'0');
    const tc  = parseFloat(document.getElementById('fPagosTC')?.value||'0');
    const msg = document.getElementById('pagosMsg');
    if (!pt)  { if(msg){msg.style.color='var(--red)';msg.textContent='Seleccioná la forma de pago';} return; }
    if (!amt) { if(msg){msg.style.color='var(--red)';msg.textContent='Ingresá el monto';} return; }
    let clientId = S.pagosClientId;
    if (!clientId && S.pagosOrderId) {
      const o = (S.orders||[]).find(o=>o.id===S.pagosOrderId);
      clientId = o?.client_id;

  document.getElementById('btnEmailCuenta')?.addEventListener('click', () => {

    const client = S.clients.find(c => c.id === clientId);
    if (!client) return;
    const { collections = [], remitos = [] } = S.clientMovements || {};
    const cur = client.balance_currency || 'USD';
    const sym = cur === 'ARS' ? '$' : 'U$D';
    const movements = [];
    collections.forEach(col => movements.push({ date: col.date, concepto: `Pago — ${fmtColPayType(col.payment_type)}`, credit: parseFloat(col.amount_account)||0, debit: 0 }));

    if (S.localCalMonth === undefined) S.localCalMonth = new Date().getMonth();
    if (S.localCalYear === undefined) S.localCalYear = new Date().getFullYear();
    S.localCalMonth--;
    if (S.localCalMonth < 0) { S.localCalMonth = 11; S.localCalYear--; }
    draw();
  });
  document.querySelector('[data-local-cal-next]')?.addEventListener('click', () => {
    if (S.localCalMonth === undefined) S.localCalMonth = new Date().getMonth();
    if (S.localCalYear === undefined) S.localCalYear = new Date().getFullYear();
    S.localCalMonth++;
    if (S.localCalMonth > 11) { S.localCalMonth = 0; S.localCalYear++; }
    draw();
  });

  // Click a calendar day
  document.querySelectorAll('[data-local-day]').forEach(cell => cell.addEventListener('click', () => {
    S.localSelectedDate = cell.dataset.localDay;
    S.modal = 'localDay'; draw();
  }));

  // New order from day modal or activos tab
  document.getElementById('btnNewLocalOrder')?.addEventListener('click', () => {
    const today = new Date().toISOString().slice(0,10);
    S.localOrderDraft = { moveType:'venta', date: today, clientSearch:'', selectedClient:null, showNewClient:false, newClient:{}, items:[], productSearch:'', paymentStatus:'pendiente', paymentAmount:'', paymentType:'', notes:'' };
    S.localOrderStep = 1; S.err = null; S.modal = 'localOrder'; draw();
  });
  document.querySelectorAll('[data-local-new-order]').forEach(b => b.addEventListener('click', () => {
    const moveType = b.dataset.moveType || 'venta';
    const date = b.dataset.date || new Date().toISOString().slice(0,10);
    S.localOrderDraft = { moveType, date, clientSearch:'', selectedClient:null, showNewClient:false, newClient:{}, items:[], productSearch:'', paymentStatus:'pendiente', paymentAmount:'', paymentType:'', notes:'' };
    S.localOrderStep = 1; S.err = null; S.modal = 'localOrder'; draw();
  }));

  // Despachados filter tabs
  document.querySelectorAll('[data-local-disp-filter]').forEach(b => b.addEventListener('click', () => {
    S.localDispFilter = b.dataset.localDispFilter; draw();
  }));

  // Search inputs
  document.getElementById('fLocalClientSearch')?.addEventListener('input', e => {
    if (!S.localOrderDraft) return;
    S.localOrderDraft.clientSearch = e.target.value;
    S.localOrderDraft.selectedClient = null;
    const pos = e.target.selectionStart; draw();
    const el = document.getElementById('fLocalClientSearch');
    if (el) { el.focus(); el.setSelectionRange(pos,pos); }
  });
  document.getElementById('fLocalActivosSearch')?.addEventListener('input', e => {
    S.localActivosSearch = e.target.value; const pos=e.target.selectionStart; draw();
    const el=document.getElementById('fLocalActivosSearch'); if(el){el.focus();el.setSelectionRange(pos,pos);}
  });
  document.getElementById('fLocalDispSearch')?.addEventListener('input', e => {
    S.localDispSearch = e.target.value; const pos=e.target.selectionStart; draw();
    const el=document.getElementById('fLocalDispSearch'); if(el){el.focus();el.setSelectionRange(pos,pos);}
  });
  document.getElementById('fLocalClientSearch_tab')?.addEventListener('input', e => {
    S.localClientSearch = e.target.value; const pos=e.target.selectionStart; draw();
    const el=document.getElementById('fLocalClientSearch_tab'); if(el){el.focus();el.setSelectionRange(pos,pos);}
  });
  // Client search in clientes tab (id without _tab suffix)
  const fLCsearch = document.getElementById('fLocalClientSearch');
  if (fLCsearch && S.localTab === 'clientes') {
    fLCsearch.addEventListener('input', e => {
      S.localClientSearch = e.target.value; draw();
    });
  }

  // Move type buttons (in wizard step 1)
  document.querySelectorAll('[data-move-type]').forEach(b => b.addEventListener('click', () => {
    if (!S.localOrderDraft) return;
    S.localOrderDraft.moveType = b.dataset.moveType; draw();
  }));

  // Pick existing client
  document.querySelectorAll('[data-pick-client]').forEach(b => b.addEventListener('click', () => {
    if (!S.localOrderDraft) return;
    const client = S.localClients.find(c => c.id === b.dataset.pickClient);
    S.localOrderDraft.selectedClient = client;
    S.localOrderDraft.clientSearch = client?.name||'';
    draw();
  }));
  document.getElementById('btnClearLocalClient')?.addEventListener('click', () => {
    if (!S.localOrderDraft) return;
    S.localOrderDraft.selectedClient = null; S.localOrderDraft.clientSearch = ''; draw();
  });
  document.getElementById('btnNewLocalClient')?.addEventListener('click', () => {
    if (!S.localOrderDraft) return;
    S.localOrderDraft.showNewClient = !S.localOrderDraft.showNewClient; draw();
  });

  // Product search in step 3
  document.getElementById('fLocalProductSearch')?.addEventListener('input', e => {
    if (!S.localOrderDraft) return;
    S.localOrderDraft.productSearch = e.target.value;
    const pos = e.target.selectionStart; draw();
    const el = document.getElementById('fLocalProductSearch');
    if (el) { el.focus(); el.setSelectionRange(pos,pos); }
  });

  // Add article to order
  document.querySelectorAll('[data-add-local-item]').forEach(b => b.addEventListener('click', () => {
    if (!S.localOrderDraft) return;
    const pcId = b.dataset.addLocalItem;
    if (S.localOrderDraft.items.find(i=>i.productColorId===pcId)) return;
    const suggested = (S.localPriceLists||[]).find(p=>p.product_color_id===pcId&&(!p.local_id||p.local_id===S.profile.local_id));
    S.localOrderDraft.items.push({ productColorId:pcId, price: suggested?.price||'', priceCurrency: suggested?.currency||'ARS', rolls:[''] });
    draw();
    // Restore search focus so user can keep adding articles
    const el = document.getElementById('fLocalProductSearch');
    if (el) { el.focus(); }
  }));

  // Remove article
  document.querySelectorAll('[data-rm-local-item]').forEach(b => b.addEventListener('click', () => {
    if (!S.localOrderDraft) return;
    const idx = parseInt(b.dataset.rmLocalItem);
    S.localOrderDraft.items.splice(idx,1); draw();
  }));

  // Sync rolls/prices from DOM before navigating
  function syncLocalRolls() {
    if (!S.localOrderDraft) return;
    S.localOrderDraft.items.forEach((item,idx) => {
      const priceEl = document.getElementById(`fLIPrice_${idx}`);
      const curEl   = document.getElementById(`fLICur_${idx}`);
      if (priceEl) item.price = priceEl.value;
      if (curEl)   item.priceCurrency = curEl.value;
      item.rolls = item.rolls.map((_,i) => {
        const el = document.getElementById(`fLRoll_${idx}_${i}`);
        return el ? el.value : _;
      });
    });
    const ps = document.getElementById('fLPayStatus');
    const pa = document.getElementById('fLPayAmount');
    const pt = document.getElementById('fLPayType');
    const pn = document.getElementById('fLNotes');
    if (ps) S.localOrderDraft.paymentStatus = ps.value;
    if (pa) S.localOrderDraft.paymentAmount = pa.value;
    if (pt) S.localOrderDraft.paymentType   = pt.value;
    if (pn) S.localOrderDraft.notes         = pn.value;
  }

  // Add/remove rolls
  document.querySelectorAll('[data-add-local-roll]').forEach(b => b.addEventListener('click', () => {
    syncLocalRolls(); const idx=parseInt(b.dataset.addLocalRoll);
    if (S.localOrderDraft?.items[idx]) { S.localOrderDraft.items[idx].rolls.push(''); draw(); }
  }));
  document.querySelectorAll('[data-rm-local-roll]').forEach(b => b.addEventListener('click', () => {
    syncLocalRolls(); const idx=parseInt(b.dataset.rmLocalRoll);
    if (S.localOrderDraft?.items[idx]?.rolls.length>1) { S.localOrderDraft.items[idx].rolls.pop(); draw(); }
  }));

  // ── STEP NAVIGATION ──
  document.getElementById('btnLocalStep2')?.addEventListener('click', () => {
    if (!S.localOrderDraft) return;
    if (!S.localOrderDraft.moveType) { S.err='Elegí un tipo de movimiento'; draw(); return; }
    S.localOrderStep = 2; S.err = null; draw();
  });

  document.getElementById('btnLocalStep3')?.addEventListener('click', async () => {
    if (!S.localOrderDraft) return;
    if (S.localOrderDraft.showNewClient) {
      const name = document.getElementById('fNLCName')?.value?.trim();
      if (!name) { S.err = 'El nombre del cliente es obligatorio'; draw(); return; }
      S.localOrderDraft.newClient = {
        name, empresa: document.getElementById('fNLCEmpresa')?.value?.trim()||'',
        cuit: document.getElementById('fNLCCuit')?.value?.trim()||'',
        phone: document.getElementById('fNLCPhone')?.value?.trim()||'',
        address: document.getElementById('fNLCAddr')?.value?.trim()||'',
        notes: document.getElementById('fNLCNotes')?.value?.trim()||'',
      };
      S.loading = true; S.err = null; draw();
      const err = await dbCreateLocalClient(S.localOrderDraft.newClient);
      S.loading = false;
      if (err) { S.err = err; draw(); return; }
      await dbLocalClients(S.profile.local_id);
      const newC = S.localClients.find(c => c.name === S.localOrderDraft.newClient.name);
      S.localOrderDraft.selectedClient = newC || null;
      S.localOrderDraft.clientId = newC?.id || null;
      S.localOrderDraft.showNewClient = false;
    } else {
      S.localOrderDraft.clientId = S.localOrderDraft.selectedClient?.id || null;
    }
    S.localOrderStep = 3; S.err = null; draw();
  });

  document.getElementById('btnLocalStep4')?.addEventListener('click', () => {
    syncLocalRolls();
    S.localOrderStep = 4; S.err = null; draw();
  });

  document.getElementById('btnLocalStep5')?.addEventListener('click', () => {
    syncLocalRolls();
    S.localOrderStep = 5; S.err = null; draw();
  });

  document.getElementById('btnLocalStep6')?.addEventListener('click', () => {
    const ps = document.getElementById('fLPayStatus');
    const pa = document.getElementById('fLPayAmount');
    const pt = document.getElementById('fLPayType');
    const pn = document.getElementById('fLNotes');
    if (ps) S.localOrderDraft.paymentStatus = ps.value;
    if (pa) S.localOrderDraft.paymentAmount = pa.value;
    if (pt) S.localOrderDraft.paymentType   = pt.value;
    if (pn) S.localOrderDraft.notes         = pn.value;
    S.localOrderStep = 6; S.err = null; draw();
  });

  document.getElementById('btnLocalOrderBack')?.addEventListener('click', () => {
    syncLocalRolls();
    if (S.localOrderStep > 1) { S.localOrderStep--; S.err = null; draw(); }
  });

  // ── SAVE BORRADOR ──
  async function saveLocalDraft(status) {
    syncLocalRolls();
    const d = S.localOrderDraft;
    if (!d) return;
    if (status === 'pendiente' && (d.items||[]).length === 0) { S.err='Agregá al menos un artículo'; draw(); return; }
    S.loading = true; S.err = null; draw();
    if (d.orderId) {
      await dbUpdateLocalOrder(d.orderId, { move_type:d.moveType, notes:d.notes, payment_status:d.paymentStatus, payment_amount:d.paymentAmount||null, payment_type:d.paymentType||null, status, order_date:d.date||null });
      await dbSaveLocalOrderItems(d.orderId, d.items);
    } else {
      const err = await dbCreateLocalOrder({ ...d, status, localId: S.profile.local_id });
      if (err) { S.loading=false; S.err=err; draw(); return; }
    }
    S.loading = false;
    await dbLocalOrders(isAdmin()?null:S.profile.local_id);
    closeModal();
  }

  document.getElementById('btnSaveLocalDraft')?.addEventListener('click', () => saveLocalDraft('borrador'));
  document.getElementById('btnConfirmLocalOrder')?.addEventListener('click', () => saveLocalDraft('pendiente'));

  // Dispatch button in order modal
  document.getElementById('btnDispatchLocalOrder')?.addEventListener('click', () => {
    syncLocalRolls();
    S.modal = 'localDispatch'; draw();
  });

  // Dispatch type selection
  async function doDispatch(type) {
    S.loading = true; S.err = null; draw();
    const err = await dbDispatchLocalOrder(S.localOrderDraft.orderId, type);
    S.loading = false;
    if (err) { S.err=err; draw(); return; }
    await dbLocalOrders(isAdmin()?null:S.profile.local_id);
    closeModal();
  }
  document.getElementById('btnDispatchEntregado')?.addEventListener('click', () => doDispatch('entregado'));
  document.getElementById('btnDispatchRetirado')?.addEventListener('click', () => doDispatch('retirado'));

  // Devolver devolución → suma stock
  document.querySelectorAll('[data-devolver]').forEach(btn => btn.addEventListener('click', async (e) => {
    e.stopPropagation();
    const orderId = btn.dataset.devolver;
    S.loading = true; draw();
    const err = await dbReturnLocalOrder(orderId);
    S.loading = false;
    if (err) { S.err = err; draw(); return; }
    await dbLocalOrders(isAdmin() ? null : S.profile.local_id);
    draw();
  }));

  // Open local order (click row)
  document.querySelectorAll('[data-local-order]').forEach(row => row.addEventListener('click', () => {
    const o = S.localOrders.find(x=>x.id===row.dataset.localOrder);
    if (!o) return;
    if (isAdmin() && (o.status==='despachado'||o.status==='revisado')) {
      S.localOrderDraft = { ...o, local_order_modifications: o.local_order_modifications||[] };
      S.modal = 'adminLocalReview'; S.err = null; draw(); return;
    }
    if (o.status === 'revisado' || o.status === 'despachado') {
      S.localOrderDraft = { ...o }; S.modal = 'adminLocalReview'; S.err = null; draw(); return;
    }
    // Editable (borrador or pendiente)
    const items = (o.local_order_items||[]).map(i=>({
      productColorId: i.product_color_id,
      price: i.price||'', priceCurrency: i.price_currency||'ARS',
      rolls: (i.local_order_rolls||[]).sort((a,b)=>a.roll_number-b.roll_number).map(r=>r.quantity+''),
    }));
    S.localOrderDraft = { orderId:o.id, moveType:o.move_type, date:(o.order_date||o.created_at||'').slice(0,10), clientId:o.client_id, selectedClient:o.clients||null, clientSearch:o.clients?.name||'', showNewClient:false, newClient:{}, items, productSearch:'', paymentStatus:o.payment_status, paymentAmount:o.payment_amount||'', paymentType:o.payment_type||'', notes:o.notes||'', status:o.status };
    S.localOrderStep = 1; S.err = null; S.modal = 'localOrder'; draw();
  }));

  // ── ACTIVOS: filter/sort/export handlers ─────────────────────────────────────
  document.getElementById('btnAFToggle')?.addEventListener('click',()=>{ S.activosShowFilters=!S.activosShowFilters; draw(); });
  document.getElementById('btnASToggle')?.addEventListener('click',()=>{ S.activosShowSort=!S.activosShowSort; draw(); });
  document.getElementById('btnAFClear')?.addEventListener('click',()=>{ S.activosFilters={cliente:'',tipo:[],fechaDesde:'',fechaHasta:'',montoMin:'',montoMax:''}; draw(); });
  document.getElementById('fAFCliente')?.addEventListener('change',e=>{ if(!S.activosFilters)S.activosFilters={}; S.activosFilters.cliente=e.target.value; draw(); });
  document.getElementById('fAFDesde')?.addEventListener('change',e=>{ if(!S.activosFilters)S.activosFilters={}; S.activosFilters.fechaDesde=e.target.value; draw(); });
  document.getElementById('fAFHasta')?.addEventListener('change',e=>{ if(!S.activosFilters)S.activosFilters={}; S.activosFilters.fechaHasta=e.target.value; draw(); });
  document.getElementById('fAFMontoMin')?.addEventListener('change',e=>{ if(!S.activosFilters)S.activosFilters={}; S.activosFilters.montoMin=e.target.value; draw(); });
  document.getElementById('fAFMontoMax')?.addEventListener('change',e=>{ if(!S.activosFilters)S.activosFilters={}; S.activosFilters.montoMax=e.target.value; draw(); });
  document.querySelectorAll('[data-af-tipo]').forEach(b=>b.addEventListener('click',()=>{
    if (!S.activosFilters) S.activosFilters={};
    if (!S.activosFilters.tipo) S.activosFilters.tipo=[];
    const t=b.dataset.afTipo;
    S.activosFilters.tipo=S.activosFilters.tipo.includes(t)?S.activosFilters.tipo.filter(x=>x!==t):[...S.activosFilters.tipo,t];
    draw();
  }));
  document.querySelectorAll('[data-as-col]').forEach(b=>b.addEventListener('click',()=>{
    if(!S.localActivosSort)S.localActivosSort={col:'fecha',dir:'desc'};
    S.localActivosSort={col:b.dataset.asCol, dir:S.localActivosSort.dir};
    draw();
  }));
  document.querySelectorAll('[data-as-dir]').forEach(b=>b.addEventListener('click',()=>{
    if(!S.localActivosSort)S.localActivosSort={col:'fecha',dir:'desc'};
    S.localActivosSort={col:S.localActivosSort.col, dir:b.dataset.asDir};
    draw();
  }));
  document.getElementById('cbAExportDet')?.addEventListener('change',e=>{ S.activosExportDetalle=e.target.checked; });
  document.getElementById('btnExportActivosCSV')?.addEventListener('click',()=>{
    const filters=S.activosFilters||{}; const sort=S.localActivosSort||{col:'fecha',dir:'desc'};
    const sq=(S.localActivosSearch||'').toLowerCase().trim();
    let list=(S.localOrders||[]).filter(o=>o.status==='borrador'||o.status==='pendiente');
    if(S.adminViewLocalId) list=list.filter(o=>o.local_id===S.adminViewLocalId);
    if(sq) list=list.filter(o=>(o.order_number||'').toLowerCase().includes(sq)||(o.clients?.name||'').toLowerCase().includes(sq));
    list=sortLocalList(applyLocalFilters(list,filters),sort);
    exportListCSV(list,!!S.activosExportDetalle,'pedidos_activos.csv');
  });
  document.getElementById('btnExportActivosPDF')?.addEventListener('click',()=>{
    const filters=S.activosFilters||{}; const sort=S.localActivosSort||{col:'fecha',dir:'desc'};
    const sq=(S.localActivosSearch||'').toLowerCase().trim();
    let list=(S.localOrders||[]).filter(o=>o.status==='borrador'||o.status==='pendiente');
    if(S.adminViewLocalId) list=list.filter(o=>o.local_id===S.adminViewLocalId);
    if(sq) list=list.filter(o=>(o.order_number||'').toLowerCase().includes(sq)||(o.clients?.name||'').toLowerCase().includes(sq));
    list=sortLocalList(applyLocalFilters(list,filters),sort);
    const localName=(S.locals||[]).find(l=>l.id===S.adminViewLocalId)?.name||'';
    exportListPDF(list,!!S.activosExportDetalle,(localName?localName+' — ':'')+'Pedidos Activos');
  });

  // ── DESPACHADOS: filter/sort/export handlers ──────────────────────────────────
  document.getElementById('btnDFToggle')?.addEventListener('click',()=>{ S.dispShowFilters=!S.dispShowFilters; draw(); });
  document.getElementById('btnDSToggle')?.addEventListener('click',()=>{ S.dispShowSort=!S.dispShowSort; draw(); });
  document.getElementById('btnDFClear')?.addEventListener('click',()=>{ S.dispFilters={cliente:'',tipo:[],fechaDesde:'',fechaHasta:'',montoMin:'',montoMax:''}; draw(); });
  document.getElementById('fDFCliente')?.addEventListener('change',e=>{ if(!S.dispFilters)S.dispFilters={}; S.dispFilters.cliente=e.target.value; draw(); });
  document.getElementById('fDFDesde')?.addEventListener('change',e=>{ if(!S.dispFilters)S.dispFilters={}; S.dispFilters.fechaDesde=e.target.value; draw(); });
  document.getElementById('fDFHasta')?.addEventListener('change',e=>{ if(!S.dispFilters)S.dispFilters={}; S.dispFilters.fechaHasta=e.target.value; draw(); });
  document.getElementById('fDFMontoMin')?.addEventListener('change',e=>{ if(!S.dispFilters)S.dispFilters={}; S.dispFilters.montoMin=e.target.value; draw(); });
  document.getElementById('fDFMontoMax')?.addEventListener('change',e=>{ if(!S.dispFilters)S.dispFilters={}; S.dispFilters.montoMax=e.target.value; draw(); });
  document.querySelectorAll('[data-df-tipo]').forEach(b=>b.addEventListener('click',()=>{
    if(!S.dispFilters)S.dispFilters={};
    if(!S.dispFilters.tipo)S.dispFilters.tipo=[];
    const t=b.dataset.dfTipo;
    S.dispFilters.tipo=S.dispFilters.tipo.includes(t)?S.dispFilters.tipo.filter(x=>x!==t):[...S.dispFilters.tipo,t];
    draw();
  }));
  document.querySelectorAll('[data-ds-col]').forEach(b=>b.addEventListener('click',()=>{
    if(!S.localDispSort)S.localDispSort={col:'fecha',dir:'desc'};
    S.localDispSort={col:b.dataset.dsCol, dir:S.localDispSort.dir};
    draw();
  }));
  document.querySelectorAll('[data-ds-dir]').forEach(b=>b.addEventListener('click',()=>{
    if(!S.localDispSort)S.localDispSort={col:'fecha',dir:'desc'};
    S.localDispSort={col:S.localDispSort.col, dir:b.dataset.dsDir};
    draw();
  }));
  document.getElementById('cbDExportDet')?.addEventListener('change',e=>{ S.dispExportDetalle=e.target.checked; });
  document.getElementById('btnExportDispCSV')?.addEventListener('click',()=>{
    const filter=S.localDispFilter||'revisar'; const statusMap={revisar:'despachado',check:'revisado'};
    const filters=S.dispFilters||{}; const sort=S.localDispSort||{col:'fecha',dir:'desc'};
    const sq=(S.localDispSearch||'').toLowerCase().trim();
    let list=(S.localOrders||[]).filter(o=>o.status===(statusMap[filter]||'despachado'));
    if(S.adminViewLocalId) list=list.filter(o=>o.local_id===S.adminViewLocalId);
    if(sq) list=list.filter(o=>(o.order_number||'').toLowerCase().includes(sq)||(o.clients?.name||'').toLowerCase().includes(sq));
    list=sortLocalList(applyLocalFilters(list,filters),sort);
    exportListCSV(list,!!S.dispExportDetalle,'pedidos_despachados.csv');
  });
  document.getElementById('btnExportDispPDF')?.addEventListener('click',()=>{
    const filter=S.localDispFilter||'revisar'; const statusMap={revisar:'despachado',check:'revisado'};
    const filters=S.dispFilters||{}; const sort=S.localDispSort||{col:'fecha',dir:'desc'};
    const sq=(S.localDispSearch||'').toLowerCase().trim();
    let list=(S.localOrders||[]).filter(o=>o.status===(statusMap[filter]||'despachado'));
    if(S.adminViewLocalId) list=list.filter(o=>o.local_id===S.adminViewLocalId);
    if(sq) list=list.filter(o=>(o.order_number||'').toLowerCase().includes(sq)||(o.clients?.name||'').toLowerCase().includes(sq));
    list=sortLocalList(applyLocalFilters(list,filters),sort);
    const localName=(S.locals||[]).find(l=>l.id===S.adminViewLocalId)?.name||'';
    exportListPDF(list,!!S.dispExportDetalle,(localName?localName+' — ':'')+'Pedidos Despachados');
  });


    // Open local order detail modal (🔍 button)

  document.querySelectorAll('[data-local-detail]').forEach(btn => btn.addEventListener('click', () => {
    const o = S.localOrders.find(x=>x.id===btn.dataset.localDetail);
    if (!o) return;
    S.localOrderDraft = { ...o };
    S.modal = 'localOrderDetail'; draw();
  }));

  // Admin open dispatched local order

  document.querySelectorAll('[data-admin-local-order]').forEach(row => row.addEventListener('click', () => {
    const o = S.localOrders.find(x=>x.id===row.dataset.adminLocalOrder);
    if (!o) return;
    S.localOrderDraft = o; S.modal = 'adminLocalReview'; S.err = null; draw();
  }));

  // Admin review → mark as revisado
  document.getElementById('btnReviewLocalOrder')?.addEventListener('click', async () => {
    const o = S.localOrderDraft;
    if (!o) return;
    const desc = document.getElementById('fAdminModDesc')?.value?.trim();
    const note = document.getElementById('fAdminModNote')?.value?.trim();
    if (desc && !note) { S.err='La justificación es obligatoria si hay modificaciones'; draw(); return; }
    S.loading = true; S.err = null; draw();
    if (desc && note) await dbAdminModifyLocalOrder(o.id, note, desc);
    const err = await dbReviewLocalOrder(o.id);
    S.loading = false;
    if (err) { S.err=err; draw(); return; }
    await dbLocalOrders(null);
    closeModal();
  });

  // Reload local orders (admin)
  document.getElementById('btnReloadLocalOrders')?.addEventListener('click', async () => {
    await dbLocalOrders(null); draw();
  });

}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { S.view = 'login'; draw(); return; }

  S.view = 'loading'; draw();
  const profile = await dbProfile(session.user.id);
  if (!profile) { S.view = 'login'; draw(); return; }
  S.profile = profile;

  await Promise.all([dbClients(isAdmin() ? 'all' : profile.id), dbSellers(), dbCompanies(), dbActions(S.year, S.month)]);

  if (isAdmin()) {
    S.tab = 'acciones';
    S.view = 'admin';
    if (isBulltex()) await Promise.all([dbProducts(), dbOrders(), dbRemitos(), dbLocals(), dbLocalOrders(null), dbLocalPriceLists()]);
    await Promise.all([dbProfiles(), dbMeetingRequests()]);
  } else if (profile.role === 'local') {
    S.localTab = 'calendario';
    S.localCalYear = new Date().getFullYear();
    S.localCalMonth = new Date().getMonth();
    S.localDispFilter = 'revisar';
    S.view = 'local';
    await Promise.all([dbLocals(), dbLocalOrders(profile.local_id), dbLocalClients(profile.local_id), dbLocalPriceLists(), dbProducts()]);
    await Promise.all([dbProfiles(), dbMeetingRequests()]);
  } else {
    S.tab = 'calendario';
    S.view = 'seller';
    if (isBulltex()) await Promise.all([dbProducts(), dbOrders(), dbRemitos(profile.id)]);
    await Promise.all([dbProfiles(), dbMeetingRequests()]);
  }

  draw();

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT' || !session) {
      S.profile = null; S.view = 'login'; draw();
    }
  });
}

(async () => {
  try {
    await boot();
  } catch(e) {
    console.error('BOOT ERROR:', e);
    const app = document.getElementById('app');
    if (app) app.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh"><div style="text-align:center;padding:32px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:400px"><div style="font-size:4rem">⚠️</div><h3 style="margin:16px 0 8px;color:#333">Error al iniciar</h3><p style="color:#666;font-size:14px">${e.message}</p></div></div></div>`;
  }
})();
</script>
